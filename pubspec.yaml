name: vtuber_chat
description: "来鳥アルエとリアルタイムで会話できるLive2D VTuberチャットアプリ"
publish_to: 'none'

version: 1.9.0+12

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: 4.13.0
  http: 1.5.0
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.0
  permission_handler: ^11.4.0
  archive: ^4.0.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/webapp/
    - assets/webapp/audio/
    - assets/webapp/audio/aizuchi/
    - assets/webapp/audio/bgm/
    - assets/webapp/icons/
    - assets/webapp/img/
    - assets/webapp/img/bg/
    - assets/webapp/img/items/
    - assets/webapp/img/loading_chars/
    - assets/webapp/img/splash/
    - assets/webapp/img/stamps/
    - assets/webapp/img/enemies/
    - assets/webapp/live2d/
    - assets/webapp/live2d/model/
    - assets/webapp/live2d/model/expressions/
    - assets/webapp/live2d/model/motions/
    - assets/webapp/live2d/model/textures/
    - assets/webapp/live2d/sdk/
