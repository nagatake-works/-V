<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Live2D Model Preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;}
#app{width:100%;height:100%;position:relative;}
canvas{display:block;width:100%!important;height:100%!important;}
#status{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  color:rgba(0,220,255,.7);font-family:'SF Mono',monospace;font-size:10px;
  background:rgba(0,0,20,.6);padding:4px 14px;border-radius:20px;
  border:1px solid rgba(0,200,255,.15);letter-spacing:.5px;
  pointer-events:none;z-index:10;transition:opacity .5s;
}
#expression-badge{
  position:absolute;bottom:12px;right:12px;
  color:rgba(0,220,255,.6);font-family:'SF Mono',monospace;font-size:9px;
  background:rgba(0,0,20,.5);padding:3px 10px;border-radius:12px;
  border:1px solid rgba(0,200,255,.1);pointer-events:none;z-index:10;
  opacity:0;transition:opacity .3s;
}
#expression-badge.show{opacity:1;}
#error-msg{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:5;
  background:rgba(2,6,16,.85);
}
#error-msg.show{display:flex;}
</style>
</head>
<body>
<div id="app">
  <div id="status">LOADING...</div>
  <div id="expression-badge"></div>
  <div id="error-msg">
    <span style="font-size:48px;margin-bottom:16px;opacity:.25;">&#x1F4E6;</span>
    <div id="error-title" style="font-size:13px;color:rgba(200,180,255,.6);font-weight:600;">
      Live2D Preview
    </div>
    <div id="error-detail" style="font-size:10px;color:rgba(160,140,210,.4);margin-top:8px;text-align:center;max-width:260px;line-height:1.6;"></div>
  </div>
</div>

<script src="sdk/live2dcubismcore.min.js"></script>
<script src="sdk/pixi.min.js"></script>
<script src="sdk/cubism4.min.js"></script>
<script>
// モデルパスはURLパラメータまたはpostMessageから受け取る
const params = new URLSearchParams(location.search);
let MODEL_URL = params.get('model') || '';
let modelName = params.get('name') || 'Model';

let app = null;
let model = null;
let currentScale = 1.0;
let dragState = { active:false, lastX:0, lastY:0 };

const statusEl = document.getElementById('status');
const badgeEl = document.getElementById('expression-badge');

function updateStatus(msg) {
  if(statusEl) statusEl.textContent = msg;
}

function showError(title, detail) {
  const el = document.getElementById('error-msg');
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-detail').innerHTML = detail;
  el.classList.add('show');
}

async function init(modelPath) {
  if(!modelPath) {
    updateStatus('WAITING FOR MODEL...');
    return;
  }
  MODEL_URL = modelPath;

  const container = document.getElementById('app');
  const W = container.clientWidth || window.innerWidth;
  const H = container.clientHeight || window.innerHeight;

  // 前回のインスタンスを破棄
  if(model && app && app.stage) {
    app.stage.removeChild(model);
    model.destroy({ children:true, texture:true, baseTexture:true });
    model = null;
  }
  if(app) {
    app.destroy(true, { children:true, texture:true, baseTexture:true });
    app = null;
  }
  const oldCanvas = container.querySelectorAll('canvas');
  oldCanvas.forEach(c => c.remove());
  document.getElementById('error-msg').classList.remove('show');
  statusEl.style.opacity = '1';

  updateStatus('INITIALIZING...');

  try {
    if(!window.PIXI || !PIXI.live2d) throw new Error('Live2D SDK not loaded');

    app = new PIXI.Application({
      width: W, height: H,
      backgroundAlpha: 0,
      antialias: true,
      autoDensity: true,
      resolution: Math.min(window.devicePixelRatio || 1, 1.5),
      powerPreference: 'high-performance',
    });
    container.insertBefore(app.view, statusEl);

    updateStatus('LOADING MODEL...');

    model = await PIXI.live2d.Live2DModel.from(MODEL_URL, {
      onError: (e) => console.error('Model load error:', e)
    });

    app.stage.addChild(model);
    placeModel();
    app.ticker.maxFPS = 30;

    updateStatus(modelName + ' READY');
    setTimeout(() => { statusEl.style.opacity = '0'; }, 2000);

    // Resize
    new ResizeObserver(() => {
      if(!app) return;
      const nw = container.clientWidth, nh = container.clientHeight;
      if(nw > 0 && nh > 0) {
        app.renderer.resize(nw, nh);
        placeModel();
      }
    }).observe(container);

    // Drag
    app.view.addEventListener('pointerdown', (e) => {
      dragState.active = true;
      dragState.lastX = e.clientX;
      dragState.lastY = e.clientY;
    });

    // 表情リストを親に通知
    const exprList = [];
    try {
      const defs = model.internalModel?.settings?.expressions;
      if(defs) defs.forEach(d => exprList.push(d.Name || d.name || ''));
    } catch(e){}
    notifyParent({ type:'l2d-preview-ready', model: modelName, expressions: exprList.filter(Boolean) });

  } catch(e) {
    console.error('Init failed:', e);
    updateStatus('LOAD FAILED');
    showError('モデル読み込み失敗', e.message);
    notifyParent({ type:'l2d-preview-error', error: e.message });
  }
}

function placeModel() {
  if(!model || !app) return;
  const W = app.renderer.width / (app.renderer.resolution || 1);
  const H = app.renderer.height / (app.renderer.resolution || 1);
  const mw = model.internalModel?.originalWidth || 512;
  const mh = model.internalModel?.originalHeight || 512;
  const baseScale = Math.min(W / mw, H / mh) * 1.3 * currentScale;
  model.scale.set(baseScale);
  model.anchor.set(0.5, 0.25);
  model.x = W / 2;
  model.y = H * 0.5;
}

function setExpression(name) {
  if(!model) return;
  try {
    if(name) {
      model.expression(name);
      badgeEl.textContent = 'EXPR: ' + name;
      badgeEl.classList.add('show');
    } else {
      model.expression();
      badgeEl.classList.remove('show');
    }
  } catch(e) { console.warn('Expression error:', e); }
}

function zoom(factor) {
  currentScale *= factor;
  currentScale = Math.max(0.3, Math.min(3.0, currentScale));
  placeModel();
}

function resetView() {
  currentScale = 1.0;
  placeModel();
}

function notifyParent(data) {
  try {
    if(window.parent && window.parent !== window) {
      window.parent.postMessage(data, '*');
    }
  } catch(e) {}
}

// Drag (global)
window.addEventListener('pointermove', (e) => {
  if(!dragState.active || !model) return;
  model.x += e.clientX - dragState.lastX;
  model.y += e.clientY - dragState.lastY;
  dragState.lastX = e.clientX;
  dragState.lastY = e.clientY;
});
window.addEventListener('pointerup', () => { dragState.active = false; });

// Commands from parent
window.addEventListener('message', (e) => {
  const d = e.data;
  if(!d || !d.type) return;
  switch(d.type) {
    case 'l2d-expression': setExpression(d.name); break;
    case 'l2d-zoom': zoom(d.factor); break;
    case 'l2d-reset': resetView(); break;
    case 'l2d-load': init(d.modelPath); if(d.name) modelName = d.name; break;
    case 'l2d-load-raw': handleRawLoad(d); break;
  }
});

// ZIPの生データからBlob URLを生成してモデルを読み込む
async function handleRawLoad(d) {
  try {
    const fileDataMap = d.fileDataMap;
    const model3Path = d.model3Path;
    if(d.name) modelName = d.name;

    updateStatus('BUILDING MODEL...');

    // basePath算出
    const idx = model3Path.lastIndexOf('/');
    const basePath = idx >= 0 ? model3Path.substring(0, idx + 1) : '';

    // 全ファイルのBlob URLを生成（iframe内で生成するので有効）
    const blobUrls = {};
    for(const name in fileDataMap) {
      let mime = 'application/octet-stream';
      if(/\.png$/i.test(name)) mime = 'image/png';
      else if(/\.jpe?g$/i.test(name)) mime = 'image/jpeg';
      else if(/\.json$/i.test(name)) mime = 'application/json';
      else if(/\.moc3$/i.test(name)) mime = 'application/octet-stream';
      blobUrls[name] = URL.createObjectURL(new Blob([fileDataMap[name]], {type: mime}));
    }

    // model3.jsonを読み取り、パスをBlob URLに書き換え
    const decoder = new TextDecoder();
    const model3Text = decoder.decode(fileDataMap[model3Path]);
    const model3Json = JSON.parse(model3Text);
    const fr = model3Json.FileReferences;

    if(fr) {
      if(fr.Moc) fr.Moc = blobUrls[basePath + fr.Moc] || fr.Moc;
      if(fr.Textures) fr.Textures = fr.Textures.map(t => blobUrls[basePath + t] || t);
      if(fr.Physics) fr.Physics = blobUrls[basePath + fr.Physics] || fr.Physics;
      if(fr.DisplayInfo) fr.DisplayInfo = blobUrls[basePath + fr.DisplayInfo] || fr.DisplayInfo;
      if(fr.Expressions) fr.Expressions = fr.Expressions.map(exp => ({
        ...exp,
        File: blobUrls[basePath + exp.File] || exp.File
      }));
      if(fr.Motions) {
        for(const group in fr.Motions) {
          fr.Motions[group] = fr.Motions[group].map(m => ({
            ...m,
            File: blobUrls[basePath + m.File] || m.File,
            Sound: m.Sound ? (blobUrls[basePath + m.Sound] || m.Sound) : undefined
          }));
        }
      }
    }

    // 書き換え済みmodel3.jsonのBlob URL生成
    const rewrittenBlob = new Blob([JSON.stringify(model3Json)], {type: 'application/json'});
    const rewrittenUrl = URL.createObjectURL(rewrittenBlob);

    console.log('iframe: model3 rewritten, loading...', rewrittenUrl);
    await init(rewrittenUrl);

  } catch(e) {
    console.error('handleRawLoad error:', e);
    updateStatus('LOAD FAILED');
    showError('モデル読み込み失敗', e.message);
  }
}

// Auto-init if model specified in URL
window.addEventListener('DOMContentLoaded', () => {
  if(MODEL_URL) init(MODEL_URL);
});
</script>
</body>
</html>
