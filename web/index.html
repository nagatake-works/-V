<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ことりアルエ - 君とV</title>
<!-- Material Symbols (Google) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<style>
/* ══════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent!important;tap-highlight-color:transparent!important;outline:none;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#070b18;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP','Meiryo',sans-serif;
  color:#ddeeff;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  tap-highlight-color:transparent;
}
.material-symbols-rounded{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
  vertical-align:middle;
  line-height:1;
}

/* ══════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════ */
/* ══ SPLASH リニューアル ══ */
#splash{
  position:fixed;inset:0;z-index:99999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  overflow:hidden;
  transition:opacity 1.2s ease;
}
#splash.hide{opacity:0;pointer-events:none;}

/* 背景グラデーション */
#splash-bg-grad{
  position:absolute;inset:0;
  background: linear-gradient(160deg,
    #ffd6f0 0%,
    #e8b4f8 18%,
    #c9a8f5 35%,
    #a8c8ff 60%,
    #b8e8ff 80%,
    #d4f0ff 100%
  );
  z-index:0;
}

/* キャラ画像（白背景なので全画面に敷く） */
#splash-chara{
  position:absolute;
  bottom:0;left:0;right:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center bottom;
  z-index:2;
  animation:charaFadeIn 1.0s ease forwards;
  opacity:0;
}
@keyframes charaFadeIn{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* キラキラ星パーティクル */
#splash-particles{
  position:absolute;inset:0;z-index:3;pointer-events:none;
}
/* タップ時キラキラエフェクト */
/* ── 全画面タップキラキラエフェクト（グローバル） ── */
#global-tap-fx{
  position:fixed;inset:0;z-index:999999;pointer-events:none;overflow:hidden;
}
.tap-burst{
  position:absolute;
  pointer-events:none;
  transform:translate(-50%,-50%);
}
.tap-burst .tb-star{
  position:absolute;
  top:50%;left:50%;
  width:0;height:0;
  transform-origin:center center;
  animation:tbFly var(--dur,0.6s) var(--delay,0s) ease-out forwards;
  opacity:0;
}
.tap-burst .tb-star::before{
  content:'';
  display:block;
  width:var(--sz,6px);height:var(--sz,6px);
  background:var(--col,#fff);
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  border-radius:1px;
  box-shadow:0 0 4px var(--col,#fff);
}
@keyframes tbFly{
  0%  {opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(0.2) rotate(0deg);}
  60% {opacity:1; transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));}
  100%{opacity:0; transform:translate(-50%,-50%) translate(calc(var(--tx)*1.3),calc(var(--ty)*1.3)) scale(0.4) rotate(calc(var(--rot)*2));}
}
/* ハート */
.tap-burst .tb-heart{
  position:absolute;
  top:50%;left:50%;
  font-size:var(--sz,11px);
  line-height:1;
  animation:tbFly var(--dur,0.75s) var(--delay,0s) ease-out forwards;
  opacity:0;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 3px var(--col,#ffaacc));
}
/* 旧スプラッシュ専用レイヤー（互換のため残す） */
#splash-tap-fx{ display:none; }
.sp-star{
  position:absolute;
  width:6px;height:6px;
  background:white;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation:starTwinkle var(--dur,2s) ease-in-out var(--delay,0s) infinite;
  opacity:0;
}
@keyframes starTwinkle{
  0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);}
  30%,70%{opacity:1;transform:scale(1) rotate(20deg);}
  50%{opacity:0.8;transform:scale(1.2) rotate(40deg);}
}
/* 大きめの光の玉 */
.sp-orb{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(255,220,255,0.3) 60%,transparent);
  animation:orbFloat var(--dur,3s) ease-in-out var(--delay,0s) infinite;
  opacity:0;
}
@keyframes orbFloat{
  0%,100%{opacity:0;transform:translateY(0) scale(0.8);}
  40%,60%{opacity:0.7;transform:translateY(-12px) scale(1);}
}

/* ロゴ */
#splash-logo-wrap{
  position:absolute;
  bottom:130px;left:0;right:0;
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  z-index:5;
  animation:logoSlideUp 0.9s 0.5s ease both;
  opacity:0;
}
@keyframes logoSlideUp{
  0%{opacity:0;transform:translateY(30px);}
  100%{opacity:1;transform:translateY(0);}
}
#splash-logo-img{
  width:280px;max-width:75vw;
  filter:drop-shadow(0 4px 20px rgba(180,100,255,0.5)) drop-shadow(0 0 40px rgba(140,180,255,0.4));
}
#splash-subtitle{
  font-size:13px;letter-spacing:2px;
  color:rgba(80,40,120,0.75);
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  text-align:center;line-height:1.7;
  text-shadow:0 1px 4px rgba(255,255,255,0.8);
}

/* 下部ローディングバー */
#splash-loading-bar-wrap{
  position:absolute;bottom:60px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:5;
  animation:fadeInUp 0.8s 1.2s ease both;
  opacity:0;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
#splash-bar-track{
  width:200px;height:3px;
  background:rgba(160,100,200,0.2);
  border-radius:4px;overflow:hidden;
}
#splash-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#e090ff,#90c8ff);
  border-radius:4px;
  box-shadow:0 0 8px rgba(200,150,255,0.6);
  transition:width 0.3s ease;
}
#splash-loading-text{
  font-size:10px;letter-spacing:3px;
  color:rgba(120,80,180,0.6);
  font-family:monospace;
}

/* ヘッダーロゴ */
.topbar-logo{
  height:36px;
  filter:drop-shadow(0 0 10px rgba(200,160,255,.6));
  vertical-align:middle;
  object-fit:contain;
}
.splash-line{
  width:180px;height:1px;margin:18px 0;
  background:linear-gradient(90deg,transparent,rgba(168,216,255,.5),transparent);
}
.boot-log{display:none;}
.boot-line{display:none;}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
}

/* ── TOPBAR ── */
#topbar{
  height:42px;
  background:rgba(7,11,24,.75);
  border-bottom:1px solid rgba(168,216,255,.08);
  display:flex;align-items:center;
  padding:0 10px;gap:8px;
  flex-shrink:0;z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
#sit-btn{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;cursor:pointer;
  background:rgba(168,216,255,.06);
  border:1px solid rgba(168,216,255,.15);
  font-size:11px;color:rgba(168,216,255,.6);
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
#sit-btn:hover,#sit-btn.active{
  background:rgba(168,216,255,.14);
  border-color:rgba(168,216,255,.45);
  color:#a8d8ff;
}
.topbar-title{
  flex:1;text-align:center;
  font-size:12px;letter-spacing:3px;
  color:rgba(168,216,255,.65);font-weight:700;
}
#affection-bar-wrap{display:flex;align-items:center;gap:5px;}
.aff-label{font-size:10px;color:rgba(168,216,255,.4);}
#affection-bar{
  width:50px;height:4px;
  background:rgba(255,255,255,.06);
  border-radius:2px;overflow:hidden;
}
#affection-fill{
  height:100%;width:50%;
  background:linear-gradient(90deg,#7b6bff,#ff80c8);
  border-radius:2px;transition:width .8s ease;
}
#aff-num{font-size:10px;color:rgba(168,216,255,.5);min-width:18px;}

/* ══════════════════════════════════════════════════
   CHARACTER AREA
══════════════════════════════════════════════════ */
#character-area{
  flex:1 1 0;
  position:relative;
  overflow:hidden;
  min-height:0;
  /* デフォルト背景 */
  background:#070b18;
}

/* 背景画像レイヤー */
#bg-layer{
  position:absolute;inset:0;
  z-index:0;
  overflow:hidden;
}
/* 静止画背景（video非対応シチュエーション用） */
#bg-img{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  transition:opacity .8s ease;
  width:100%;height:100%;
}
/* 動画背景 */
#bg-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  opacity:0;
  transition:opacity .8s ease;
  z-index:1;
}
#bg-video.active{ opacity:1; }
#bg-layer::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(7,11,24,.25) 0%,
    rgba(7,11,24,.15) 50%,
    rgba(7,11,24,.7) 100%);
  z-index:2;
  pointer-events:none;
}

/* スキャンライン */
#scanline{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,
    transparent,transparent 3px,
    rgba(168,216,255,.007) 3px,rgba(168,216,255,.007) 4px);
}

/* Live2D ローディング */
#live2d-loading{
  position:absolute;inset:0;z-index:50;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(180deg,#070b18 0%,#0c1224 60%,#070b18 100%);
  transition:opacity .9s ease;
  overflow:hidden;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
#live2d-loading.hidden{opacity:0;pointer-events:none;}

/* ── スコア表示（右上） ── */
#loading-score{
  position:absolute;top:14px;right:16px;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  pointer-events:none;
}
#loading-score-label{
  font-size:8px;letter-spacing:2px;color:rgba(168,216,255,.4);font-family:monospace;
}
#loading-score-val{
  font-size:22px;font-weight:800;letter-spacing:1px;
  color:#a8d8ff;
  text-shadow:0 0 16px rgba(168,216,255,.6);
  font-family:monospace;
  transition:transform .1s;
}
#loading-score-val.pop{animation:scorePop .25s ease;}
@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ── 中央メインキャラ ── */
#loading-main-char{
  width:140px;height:140px;
  position:relative;z-index:2;
  pointer-events:none;
}
#loading-main-char img{
  width:100%;height:100%;object-fit:contain;
  animation:mainBounce 0.55s ease-in-out infinite alternate;
  filter:drop-shadow(0 8px 24px rgba(168,216,255,.35));
}
@keyframes mainBounce{
  0%  {transform:translateY(0)    scaleY(1)    scaleX(1);}
  70% {transform:translateY(-28px) scaleY(1.06) scaleX(0.96);}
  100%{transform:translateY(-32px) scaleY(1.08) scaleX(0.95);}
}
/* 着地スカッシュ */
#loading-main-char img.squish{animation:mainSquish .2s ease;}
@keyframes mainSquish{
  0%  {transform:scaleX(1)   scaleY(1);}
  40% {transform:scaleX(1.4) scaleY(0.55);}
  70% {transform:scaleX(0.92) scaleY(1.1);}
  100%{transform:scaleX(1)   scaleY(1);}
}
/* 影 */
#loading-main-shadow{
  width:80px;height:12px;
  background:radial-gradient(ellipse,rgba(168,216,255,.25) 0%,transparent 70%);
  border-radius:50%;
  margin-top:-4px;
  animation:shadowPulse 0.55s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes shadowPulse{
  0%  {transform:scaleX(1);   opacity:.7;}
  100%{transform:scaleX(0.6); opacity:.3;}
}

/* タップ誘導テキスト */
#loading-tap-hint{
  margin-top:14px;
  font-size:10px;letter-spacing:3px;
  color:rgba(168,216,255,.45);font-family:monospace;
  animation:hintBlink 1.8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes hintBlink{0%,100%{opacity:.8}50%{opacity:.25}}

/* プログレスバー */
.l2d-bar-wrap{width:100px;height:2px;background:rgba(168,216,255,.1);border-radius:1px;margin-top:18px;overflow:hidden;}
.l2d-bar{height:100%;width:0%;background:linear-gradient(90deg,#7b6bff,#a8d8ff);border-radius:1px;transition:width .4s ease;}
.l2d-sub{font-size:9px;letter-spacing:1.5px;color:rgba(168,216,255,.3);font-family:monospace;margin-top:8px;}

/* ── タップで落下する小キャラ ── */
.falling-chibi{
  position:absolute;
  width:40px;height:40px;
  pointer-events:none;
  z-index:3;
  will-change:transform,opacity;
}
.falling-chibi img{width:100%;height:100%;object-fit:contain;}

/* ── 着地して積まれたキャラ ── */
#chibi-pile{
  position:absolute;
  bottom:0;left:0;right:0;
  height:160px;
  pointer-events:none;
  z-index:4;
}
.piled-chibi{
  position:absolute;
  bottom:0;
  width:40px;height:40px;
  pointer-events:none;
}
.piled-chibi img{width:100%;height:100%;object-fit:contain;}

/* 旧互換 */
#chibi-stack-wrap{display:none;}
.chibi-unit{display:none;}
@keyframes chibi-drop{0%{opacity:0;transform:translateY(-80px)}100%{opacity:1;transform:translateY(0)}}
@keyframes chibi-bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}70%{transform:translateY(3px)}}
@keyframes chibi-squish{0%{transform:scaleX(1) scaleY(1)}30%{transform:scaleX(1.3) scaleY(.6)}100%{transform:scaleX(1) scaleY(1)}}

/* Live2D canvas wrap */
#live2d-canvas-wrap{
  position:absolute;
  inset:0; /* フルサイズ維持（比率崩れ防止） */
  z-index:45; /* chat-area(60)より下 */
  pointer-events:none;
}
#live2d-canvas-wrap canvas{width:100%!important;height:100%!important;display:block;}

/* タップ波紋 → 削除済み */

/* HUD */
.hud-tag{
  position:absolute;
  display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;
  font-size:9px;letter-spacing:1.5px;
  pointer-events:none;z-index:10;
  backdrop-filter:blur(8px);
}
.hud-tag-live2d{top:8px;left:10px;background:rgba(7,11,24,.5);border:1px solid rgba(100,255,160,.2);color:rgba(100,255,160,.7);display:none;}
.hud-tag-ai{top:8px;right:10px;background:rgba(7,11,24,.5);border:1px solid rgba(168,216,255,.2);color:rgba(168,216,255,.7);display:none;}
.hud-dot{width:4px;height:4px;border-radius:50%;}
.hud-dot-green{background:#64ffa0;box-shadow:0 0 6px #64ffa0;}
.hud-dot-cyan{background:#a8d8ff;box-shadow:0 0 6px #a8d8ff;}

/* ネームプレート */
#name-plate{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  padding:5px 22px;
  background:rgba(7,11,24,.5);
  border:1px solid rgba(168,216,255,.18);
  border-radius:20px;
  text-align:center;pointer-events:none;z-index:10;
  backdrop-filter:blur(12px);
}
.name-main{font-size:12px;letter-spacing:5px;color:rgba(168,216,255,.9);font-weight:600;}
.name-sub{font-size:8px;letter-spacing:2px;color:rgba(168,216,255,.45);margin-top:1px;}

/* ──── スタンプパネル ──── */
#stamp-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;z-index:300;
  background:rgba(7,11,24,.92);
  border-top:1px solid rgba(168,216,255,.15);
  padding:10px 12px 16px;
  backdrop-filter:blur(20px);
}
#stamp-panel.open{display:block;}
.stamp-header{
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
}
.stamp-title{font-size:10px;letter-spacing:2px;color:rgba(168,216,255,.6);}
.stamp-close{
  margin-left:auto;cursor:pointer;
  color:rgba(168,216,255,.4);font-size:16px;
  -webkit-tap-highlight-color:transparent;
}
.stamp-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.stamp-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px;border-radius:10px;
  border:1px solid rgba(168,216,255,.08);
  background:rgba(168,216,255,.03);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.stamp-item:hover,.stamp-item:active{
  background:rgba(168,216,255,.12);border-color:rgba(168,216,255,.4);
}
.stamp-item img{width:72px;height:72px;object-fit:contain;}
.stamp-item-label{font-size:9px;color:rgba(168,216,255,.5);letter-spacing:1px;}

/* スタンプ送信アニメーション */
.stamp-sent-overlay{
  position:fixed;inset:0;z-index:500;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.stamp-anim-img{
  width:220px;height:220px;object-fit:contain;
  animation:stamp-pop .7s ease-out forwards;
}
@keyframes stamp-pop{
  0%{transform:scale(0.2) rotate(-15deg);opacity:0;}
  60%{transform:scale(1.15) rotate(5deg);opacity:1;}
  80%{transform:scale(0.95) rotate(-2deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.stamp-fade-out{animation:stamp-fadeout .5s ease-in forwards!important;}
@keyframes stamp-fadeout{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.3) translateY(-30px);}
}

/* スタンプボタン（入力エリア） */
#stamp-btn{
  width:38px;height:38px;flex-shrink:0;
  background:rgba(168,216,255,.06);
  border:1px solid rgba(168,216,255,.2);
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:rgba(168,216,255,.6);
  -webkit-tap-highlight-color:transparent;
}
#stamp-btn:hover{background:rgba(168,216,255,.16);color:#a8d8ff;}
#stamp-btn .material-symbols-rounded{font-size:20px;}

/* 音声ボタン */
#voice-btn{
  position:absolute;top:8px;right:10px;z-index:15;
  width:28px;height:28px;
  background:rgba(7,11,24,.55);
  border:1px solid rgba(168,216,255,.2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(168,216,255,.6);
  backdrop-filter:blur(8px);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#voice-btn:hover{background:rgba(168,216,255,.14);color:#a8d8ff;}
#voice-btn .material-symbols-rounded{font-size:16px;}
#voice-btn.speaking{
  border-color:rgba(168,216,255,.6);
  box-shadow:0 0 12px rgba(168,216,255,.3);
  animation:voice-pulse 1.2s ease-in-out infinite;
}
@keyframes voice-pulse{
  0%,100%{box-shadow:0 0 8px rgba(168,216,255,.2);}
  50%{box-shadow:0 0 20px rgba(168,216,255,.5);}
}

/* バストアップ固定 - スクロールインジケータ非表示 */
#bust-indicator{
  position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:1.5px;color:rgba(168,216,255,.3);
  pointer-events:none;z-index:10;
}


/* ══════════════════════════════════════════════════
   CHAT AREA
══════════════════════════════════════════════════ */
#chat-area{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;flex-direction:column;
  background:rgba(5,8,20,.97);
  border-top:1px solid rgba(168,216,255,.12);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  z-index:60; /* canvas-wrapより確実に上 */
  max-height:23vh;
}
/* ローディング中はチャットUI全体を非表示 */
body.loading #chat-area{
  display:none!important;
}

/* ══════════════════════════════════════
   LINE型チャット (常時表示スクロール)
══════════════════════════════════════ */
/* タイピングインジケーター */
#typing-indicator{display:none;align-items:center;gap:4px;padding:4px 12px;}
#typing-indicator.show{display:flex;}
.t-dot{width:5px;height:5px;border-radius:50%;background:rgba(168,216,255,.6);animation:tDot 1.2s infinite;}
.t-dot:nth-child(2){animation-delay:.2s;}
.t-dot:nth-child(3){animation-delay:.4s;}
@keyframes tDot{0%,80%,100%{opacity:.3;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* チャットスクロールエリア */
#chat-scroll-area{
  flex:1 1 auto;
  overflow-y:auto;
  padding:8px 10px 4px;
  display:flex;flex-direction:column;
  gap:6px;
  scroll-behavior:smooth;
  min-height:0;
  background:rgba(4,7,18,.6);
}
#chat-scroll-area::-webkit-scrollbar{width:3px;}
#chat-scroll-area::-webkit-scrollbar-track{background:transparent;}
#chat-scroll-area::-webkit-scrollbar-thumb{background:rgba(168,216,255,.2);border-radius:2px;}

/* ユーザーバブル（右） */
.bubble-user{display:flex;justify-content:flex-end;animation:bubblePop .2s ease;}
.bubble-user-inner{
  max-width:78%;padding:8px 14px;
  background:rgba(123,107,255,.25);
  border:1px solid rgba(123,107,255,.45);
  border-radius:16px 4px 16px 16px;
  font-size:13px;line-height:1.6;color:rgba(230,220,255,.95);
  word-break:break-word;
}
/* AIバブル（左） */
.bubble-ai{display:flex;gap:8px;align-items:flex-end;animation:bubblePop .2s ease;}
.bubble-ai-avatar{
  width:26px;height:26px;flex-shrink:0;
  background:rgba(168,216,255,.1);
  border:1px solid rgba(168,216,255,.25);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
}
.bubble-ai-inner{
  max-width:80%;padding:8px 14px;
  background:rgba(168,216,255,.08);
  border:1px solid rgba(168,216,255,.2);
  border-radius:4px 16px 16px 16px;
  font-size:13px;line-height:1.6;color:rgba(210,235,255,.9);
  word-break:break-word;
  transition:border-color .4s ease;
}
.bubble-ai-inner.speaking{border-color:rgba(168,216,255,.5);}
@keyframes bubblePop{from{opacity:0;transform:scale(.95) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* 旧互換 (bubble-ai-small) */
.bubble-ai-small{display:flex;margin:0;}
.bubble-ai-small-inner{display:none;}

/* エラー */
#error-msg{
  display:none;margin:3px 12px;padding:5px 11px;
  background:rgba(40,8,8,.7);border:1px solid rgba(255,100,100,.25);
  border-radius:6px;font-size:11px;color:rgba(255,140,140,.8);
  align-items:center;gap:8px;
}
#error-msg.show{display:flex;}
#error-close{cursor:pointer;margin-left:auto;color:rgba(255,100,100,.6);}

/* 入力エリア */
#input-area{
  padding:6px 10px 10px;
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
}
#msg-input{
  flex:1;
  background:rgba(168,216,255,.05);
  border:1px solid rgba(168,216,255,.18);
  border-radius:20px;
  padding:9px 16px;
  font-size:13.5px;color:rgba(220,238,255,.9);
  font-family:inherit;outline:none;resize:none;
  max-height:80px;min-height:36px;
  transition:border-color .2s,background .2s;
  line-height:1.4;
}
#msg-input:focus{border-color:rgba(168,216,255,.45);background:rgba(168,216,255,.09);}
#msg-input::placeholder{color:rgba(168,216,255,.22);}
#send-btn{
  width:38px;height:38px;flex-shrink:0;
  background:rgba(168,216,255,.08);
  border:1px solid rgba(168,216,255,.35);
  border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  color:rgba(168,216,255,.8);
  -webkit-tap-highlight-color:transparent;
}
#send-btn:hover:not(:disabled){background:rgba(168,216,255,.2);border-color:rgba(168,216,255,.7);box-shadow:0 0 14px rgba(168,216,255,.25);}
#send-btn:disabled{border-color:rgba(168,216,255,.1);color:rgba(168,216,255,.2);cursor:default;}
#send-btn .material-symbols-rounded{font-size:20px;}

/* BGMトグル */
#bgm-btn{
  position:absolute;top:8px;right:44px;z-index:15;
  width:28px;height:28px;
  background:rgba(7,11,24,.55);
  border:1px solid rgba(168,216,255,.2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(168,216,255,.6);
  backdrop-filter:blur(8px);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#bgm-btn:hover{background:rgba(168,216,255,.14);color:#a8d8ff;}
#bgm-btn .material-symbols-rounded{font-size:16px;}

/* シチュエーションパネル */
#sit-panel{
  display:none;
  position:absolute;top:42px;left:0;right:0;
  background:rgba(7,11,24,.92);
  border-bottom:1px solid rgba(168,216,255,.12);
  padding:12px;z-index:200;
  backdrop-filter:blur(24px);
}
#sit-panel.open{display:block;}
.sit-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sit-bar{width:2px;height:13px;background:rgba(168,216,255,.6);border-radius:1px;}
.sit-title{font-size:10px;letter-spacing:2px;color:rgba(168,216,255,.7);}
.sit-grid{display:flex;flex-wrap:wrap;gap:6px;}
.sit-item{
  display:flex;align-items:center;gap:6px;
  padding:7px 11px;border-radius:10px;cursor:pointer;
  background:rgba(168,216,255,.04);
  border:1px solid rgba(168,216,255,.12);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.sit-item:hover,.sit-item.active{background:rgba(168,216,255,.12);border-color:rgba(168,216,255,.5);}
.sit-item-emoji{font-size:15px;}
.sit-item-name{font-size:11px;color:rgba(220,238,255,.8);}
.sit-item.active .sit-item-name{color:#a8d8ff;font-weight:600;}
.sit-item-sub{font-size:8px;color:rgba(168,216,255,.4);letter-spacing:.5px;}

/* ══════════════════════════════════════
   ミニルーム / バトル / ショップ
══════════════════════════════════════ */
/* チャット画面のミニルームボタン */
/* ミニキャラウィジェット */
#miniroom-nav-btn{
  position:fixed;
  bottom:calc(23vh + 8px);
  right:10px;
  width:68px;
  cursor:pointer;
  z-index:62;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  border:none;
  background:none;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}
body.loading #miniroom-nav-btn{display:none!important;}
#mc-img-wrap{
  position:relative;
  width:68px;
  height:68px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
#mc-img{
  width:62px;
  height:auto;
  filter:drop-shadow(0 4px 12px rgba(180,100,255,.55));
  transform-origin:bottom center;
  animation:mcIdle 0s ease-in-out infinite; /* JSで切替 */
  image-rendering:auto;
}
@keyframes mcIdle{
  0%,100%{transform:translateY(0) scaleX(1);}
  50%{transform:translateY(-3px) scaleX(1);}
}
@keyframes mcJump{
  0%  {transform:translateY(0)    scaleX(1)   scaleY(1);}
  20% {transform:translateY(0)    scaleX(1.15) scaleY(0.75);}
  45% {transform:translateY(-28px) scaleX(0.9)  scaleY(1.1);}
  70% {transform:translateY(-28px) scaleX(0.9)  scaleY(1.1);}
  85% {transform:translateY(-2px)  scaleX(1.1)  scaleY(0.85);}
  100%{transform:translateY(0)    scaleX(1)   scaleY(1);}
}
@keyframes mcLand{
  0%  {transform:scaleX(1.2) scaleY(0.7);}
  60% {transform:scaleX(0.95) scaleY(1.05);}
  100%{transform:scaleX(1) scaleY(1);}
}
#mc-lv-badge{
  background:linear-gradient(135deg,rgba(0,180,255,.85),rgba(60,80,255,.8));
  border:1px solid rgba(0,220,255,.35);
  border-radius:2px;
  padding:1px 7px;
  font-size:9px;
  font-weight:700;
  color:#fff;
  letter-spacing:1.5px;
  margin-top:-4px;
  box-shadow:0 0 8px rgba(0,200,255,.4),0 2px 8px rgba(0,0,30,.4);
  pointer-events:none;
  text-shadow:0 0 6px rgba(0,220,255,.5);
  clip-path:polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);
}
#mc-img{
  filter:drop-shadow(0 0 8px rgba(0,200,255,.3)) drop-shadow(0 4px 10px rgba(100,40,255,.4));
}

/* ミニルーム全体オーバーレイ */
/* ═══════════════════════════════════════
   MINIROOM - CYBERPUNK FUTURISTIC UI
   ═══════════════════════════════════════ */
@keyframes mrGridScroll{
  0%{background-position:0 0;}
  100%{background-position:0 80px;}
}
@keyframes mrScanline{
  0%{top:-8px;}
  100%{top:100%;}
}
@keyframes mrPulseGlow{
  0%,100%{opacity:.4;}
  50%{opacity:.9;}
}
@keyframes mrFloat{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-14px);}
}
/* JS制御用：hop-in-place */
@keyframes mrHop{
  0%  {transform:scaleX(var(--sd-sx,1)) translateY(0) scaleY(1);}
  18% {transform:scaleX(var(--sd-sx,1)) translateY(0) scaleX(1.15) scaleY(0.78);}
  42% {transform:scaleX(var(--sd-sx,1)) translateY(-22px) scaleX(0.88) scaleY(1.12);}
  70% {transform:scaleX(var(--sd-sx,1)) translateY(-22px) scaleX(0.88) scaleY(1.12);}
  88% {transform:scaleX(var(--sd-sx,1)) translateY(-2px) scaleX(1.08) scaleY(0.88);}
  100%{transform:scaleX(var(--sd-sx,1)) translateY(0) scaleY(1);}
}
@keyframes mrHexPulse{
  0%,100%{opacity:.15;transform:scale(1);}
  50%{opacity:.35;transform:scale(1.04);}
}
@keyframes mrBarGlow{
  0%,100%{box-shadow:0 0 6px rgba(100,220,255,.3);}
  50%{box-shadow:0 0 14px rgba(100,220,255,.7),0 0 24px rgba(100,220,255,.3);}
}
@keyframes mrStaminaWave{
  0%{background-position:0% 50%;}
  100%{background-position:200% 50%;}
}
@keyframes mrCyberIn{
  from{opacity:0;transform:translateY(-6px) scale(.97);}
  to{opacity:1;transform:none;}
}

#miniroom-overlay{
  position:fixed;inset:0;z-index:200;
  display:none;flex-direction:column;
  background:linear-gradient(160deg,#040812 0%,#080516 50%,#030a14 100%);
  font-family:inherit;
  overflow:hidden;
}
#miniroom-overlay::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,200,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,200,255,.04) 1px,transparent 1px);
  background-size:40px 40px;
  animation:mrGridScroll 4s linear infinite;
}
#miniroom-overlay::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,200,255,.15),rgba(150,80,255,.15),transparent);
  pointer-events:none;z-index:0;
  animation:mrScanline 5s linear infinite;
}
#miniroom-overlay.show{display:flex;}

/* ─── ステータスバー（上部HUD） ─── */
#mr-statusbar{
  position:relative;z-index:5;
  padding:10px 14px 8px;
  background:linear-gradient(180deg,rgba(4,8,20,.98) 0%,rgba(6,12,28,.92) 100%);
  border-bottom:1px solid rgba(0,200,255,.15);
  display:flex;flex-direction:column;gap:6px;
  box-shadow:0 2px 20px rgba(0,200,255,.08),inset 0 -1px 0 rgba(0,200,255,.12);
}
/* コーナーデコ */
#mr-statusbar::before,#mr-statusbar::after{
  content:'';position:absolute;
  width:8px;height:8px;
  border-color:rgba(0,200,255,.4);
  border-style:solid;
}
#mr-statusbar::before{top:6px;left:6px;border-width:2px 0 0 2px;}
#mr-statusbar::after{top:6px;right:6px;border-width:2px 2px 0 0;}

/* ── HUDヘッダー行 ── */
.mr-hud-header{
  display:flex;align-items:center;justify-content:space-between;
}
.mr-char-label{
  font-size:9px;letter-spacing:3px;color:rgba(0,200,255,.6);
  text-transform:uppercase;
}
.mr-lv-badge{
  font-size:10px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,rgba(0,200,255,.15),rgba(100,80,255,.1));
  border:1px solid rgba(0,200,255,.35);
  border-radius:3px;padding:2px 8px;
  color:#00c8ff;
  text-shadow:0 0 8px rgba(0,200,255,.5);
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
}
.mr-gold-badge{
  font-size:10px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,rgba(255,210,80,.15),rgba(255,160,40,.08));
  border:1px solid rgba(255,200,60,.3);
  border-radius:3px;padding:2px 8px;
  color:#ffd050;
  text-shadow:0 0 8px rgba(255,200,60,.4);
}

/* ── EXPバー ── */
.mr-bar-row{
  display:flex;align-items:center;gap:6px;
}
.mr-bar-label{
  font-size:8px;letter-spacing:2px;color:rgba(0,200,255,.5);
  min-width:28px;flex-shrink:0;
}
#mr-exp-bar-wrap{
  flex:1;height:6px;
  background:rgba(255,255,255,.06);
  border-radius:2px;overflow:hidden;
  border:1px solid rgba(0,200,255,.1);
}
#mr-exp-bar-fill{
  height:100%;
  background:linear-gradient(90deg,#00c8ff,#8060ff,#cc80ff);
  border-radius:2px;
  transition:width .6s ease;
  box-shadow:0 0 6px rgba(0,200,255,.5);
  animation:mrBarGlow 2s ease-in-out infinite;
}
#mr-exp-next-label{
  font-size:8px;color:rgba(0,200,255,.4);min-width:32px;text-align:right;
}

/* ── スタミナバー ── */
#mr-stamina-bar-wrap{
  flex:1;height:6px;
  background:rgba(255,255,255,.06);
  border-radius:2px;overflow:hidden;
  border:1px solid rgba(0,255,150,.1);
}
#mr-stamina-bar-fill{
  height:100%;
  background-size:200% 100%;
  background-image:linear-gradient(90deg,#00ff96,#00c8ff,#00ff96);
  border-radius:2px;
  transition:width .6s ease;
  animation:mrStaminaWave 2s linear infinite;
}
#mr-stamina-bar-fill.low{background-image:linear-gradient(90deg,#ff9040,#ffcc40,#ff9040);}
#mr-stamina-bar-fill.empty{background-image:linear-gradient(90deg,#ff4060,#cc2040,#ff4060);}
#mr-stamina-val{
  font-size:8px;color:rgba(0,255,150,.6);min-width:44px;text-align:right;
}

/* ── ステータス数値行 ── */
.mr-stats-row{
  display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  margin-top:1px;
}
.mr-stat-badge{
  font-size:9px;letter-spacing:.5px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(0,200,255,.1);
  border-radius:2px;padding:1px 6px;
  color:rgba(180,220,255,.7);
  font-variant-numeric:tabular-nums;
}
.mr-name-badge{
  font-size:9px;font-weight:600;
  color:rgba(0,200,255,.5);
  display:flex;align-items:center;gap:3px;
  letter-spacing:1px;
}
.mr-name-badge img{width:18px;height:18px;border-radius:50%;object-fit:cover;opacity:.7;}

/* ─── ミニルーム本体 ─── */
#mr-room{
  flex:1;position:relative;overflow:hidden;
}
/* サイバーグリッド背景オーバーレイ */
#mr-room::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;
  background:linear-gradient(180deg,rgba(4,8,20,.2) 0%,transparent 40%,rgba(4,8,20,.35) 100%);
}
#mr-room-bg{
  position:absolute;inset:0;
  background:url('img/miniroom_bg.png') center/cover no-repeat;
}
#mr-sd-chara{
  position:absolute;
  left:50%;
  bottom:10%;
  transform:translateX(-50%) translateY(0px);
  width:180px;
  filter:drop-shadow(0 0 18px rgba(0,200,255,.35)) drop-shadow(0 8px 24px rgba(130,60,255,.4));
  cursor:pointer;
  z-index:2;
  transform-origin:bottom center;
  animation:mrFloatSmall 3.2s ease-in-out infinite;
}
@keyframes mrFloatSmall{
  0%,100%{transform:translateX(-50%) translateY(0px);}
  50%{transform:translateX(-50%) translateY(-10px);}
}

/* ─── ボトムHUDバー ─── */
#mr-bottom{
  display:flex;gap:8px;padding:10px 12px;
  background:linear-gradient(0deg,rgba(4,8,20,.99) 0%,rgba(6,12,28,.92) 100%);
  border-top:1px solid rgba(0,200,255,.12);
  position:relative;z-index:5;
  box-shadow:0 -2px 20px rgba(0,200,255,.06),inset 0 1px 0 rgba(0,200,255,.1);
}
#mr-bottom::before,#mr-bottom::after{
  content:'';position:absolute;
  width:8px;height:8px;
  border-color:rgba(0,200,255,.35);
  border-style:solid;
  bottom:8px;
}
#mr-bottom::before{left:8px;border-width:0 0 2px 2px;}
#mr-bottom::after{right:8px;border-width:0 2px 2px 0;}

.mr-main-btn{
  flex:1;height:48px;border-radius:4px;border:none;
  font-size:11px;font-weight:700;letter-spacing:2.5px;
  cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .12s;
  position:relative;overflow:hidden;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.mr-main-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transition:left .35s ease;
}
.mr-main-btn:hover::after{left:100%;}
.mr-main-btn:active{transform:scale(.96);}

#mr-battle-btn{
  background:linear-gradient(135deg,#ff3060,#ff6020);
  color:#fff;
  box-shadow:0 0 16px rgba(255,40,80,.35),inset 0 1px 0 rgba(255,255,255,.2);
  text-shadow:0 0 8px rgba(255,100,100,.5);
  border:1px solid rgba(255,80,80,.3);
}
#mr-battle-btn:hover{box-shadow:0 0 28px rgba(255,40,80,.6),inset 0 1px 0 rgba(255,255,255,.2);}
#mr-battle-btn:disabled{opacity:.35;cursor:default;}
#mr-battle-btn:disabled::after{display:none;}

#mr-shop-btn{
  background:linear-gradient(135deg,#0080ff,#6040ff);
  color:#fff;
  box-shadow:0 0 16px rgba(0,128,255,.35),inset 0 1px 0 rgba(255,255,255,.15);
  text-shadow:0 0 8px rgba(0,150,255,.5);
  border:1px solid rgba(0,150,255,.3);
}
#mr-shop-btn:hover{box-shadow:0 0 28px rgba(0,128,255,.6),inset 0 1px 0 rgba(255,255,255,.15);}

#mr-back-btn{
  width:44px;height:48px;border-radius:4px;border:none;
  background:rgba(255,255,255,.05);
  color:rgba(0,200,255,.7);
  font-size:16px;cursor:pointer;
  border:1px solid rgba(0,200,255,.15);
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:background .15s,color .15s;
}
#mr-back-btn:hover{background:rgba(0,200,255,.1);color:#00c8ff;}

/* ═══════════════════════════════════════
   BATTLE MODAL - CYBERPUNK FUTURISTIC UI
   ═══════════════════════════════════════ */
@keyframes battleLogIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes battleShake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-5px);}40%,80%{transform:translateX(5px);}}
@keyframes battleHPPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.4);}}
@keyframes vsFlash{0%{opacity:.6;text-shadow:0 0 10px rgba(255,200,80,.3);}50%{opacity:1;text-shadow:0 0 30px rgba(255,200,80,.9),0 0 60px rgba(255,200,80,.4);}100%{opacity:.6;}}
@keyframes battleResultIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}

#battle-modal{
  position:fixed;inset:0;z-index:300;
  display:none;align-items:center;justify-content:center;
  background:rgba(2,4,12,.92);
  backdrop-filter:blur(12px);
}
#battle-modal::before{

/* ══════════════════════════════
   Web Audio（BGM + SE）
══════════════════════════════ */
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

/* UIクリック音（短い「チッ」） */
function playSE_click(){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(1200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.06);
    g.gain.setValueAtTime(0.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.1);
  }catch(e){}
}

/* メッセージ送信音（少し高め） */
function playSE_send(){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(900,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1400,ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.15);
  }catch(e){}
}

/* 応答受信音（柔らかいチャイム） */
function playSE_receive(){
  try{
    const ctx=getAudioCtx();
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      const t=ctx.currentTime+i*0.1;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.1,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.4);
    });
  }catch(e){}
}

function toggleVoice(){

  }

async function speakText(text){
  if(!voiceEnabled) return;
  try{
    // 現在再生中の音声を停止
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    const vBtn=document.getElementById('voice-btn');
    vBtn.classList.add('speaking');

    const resp=await fetch('/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text, voice:'ja-JP-NanamiNeural'}),
    });
    if(!resp.ok) throw new Error('TTS failed');

    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    currentAudio=audio;

    // 口パク開始
    _startLipSync(audio);

    // 再生完了をPromiseで返す（話し切ってから次の処理ができる）
    await new Promise((resolve)=>{
      audio.onended=()=>{
        vBtn.classList.remove('speaking');
        URL.revokeObjectURL(url);
        currentAudio=null;
        _stopLipSync();
        resolve();
      };
      audio.onerror=()=>{
        vBtn.classList.remove('speaking');
        currentAudio=null;
        _stopLipSync();
        resolve(); // エラーでもresolveして次へ進む
      };
      audio.play().catch(e=>{
        console.warn('audio play error:',e);
        vBtn.classList.remove('speaking');
        _stopLipSync();
        resolve();
      });
    });
  }catch(e){
    console.warn('TTS error:',e);
    document.getElementById('voice-btn').classList.remove('speaking');
    _stopLipSync();
  }
}

/* ══════════════════════════════
   口パク（リップシンク）
══════════════════════════════ */
let _lipSyncTimer = null;
let _lipSyncAudioCtx = null;
let _lipSyncAnalyser = null;
let _lipSyncSource = null;
let _lipSyncAudioEl = null; // 現在接続中のAudioElement

function _setMouth(val){
  const v = Math.max(0, Math.min(1, val));
  if(live2dModel){
    try{ live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', v); }catch(e){}
  }
  if(window._fallbackSetMouth) window._fallbackSetMouth(v);
}

function _startLipSync(audioEl){
  _stopLipSync();

  const useSameEl = (_lipSyncAudioEl === audioEl);
  _lipSyncAudioEl = audioEl;

  try{
    if(!_lipSyncAudioCtx){
      _lipSyncAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }
    if(_lipSyncAudioCtx.state==='suspended') _lipSyncAudioCtx.resume();

    _lipSyncAnalyser = _lipSyncAudioCtx.createAnalyser();
    _lipSyncAnalyser.fftSize = 256;
    _lipSyncAnalyser.smoothingTimeConstant = 0.5; // 適度なスムージングで滑らかな開閉に

    if(!useSameEl){
      if(_lipSyncSource){ try{ _lipSyncSource.disconnect(); }catch(e){} _lipSyncSource=null; }
      _lipSyncSource = _lipSyncAudioCtx.createMediaElementSource(audioEl);
    }
    _lipSyncSource.connect(_lipSyncAnalyser);
    _lipSyncAnalyser.connect(_lipSyncAudioCtx.destination);

    const dataArray = new Uint8Array(_lipSyncAnalyser.frequencyBinCount);
    let _mouthCur   = 0;   // 現在の口開き値
    let _silenceCount = 0; // 無音フレーム数
    let _phase = 0;        // 開閉サイクル用位相（ラジアン）
    // 日本語TTS: 音節ごとに口が開閉するテンポに合わせた速度
    const CYCLE_SPEED = 0.27; // 1フレーム(16ms)あたりの位相進み → 約0.27/(2π)*60fps ≈ 2.6Hz（半分のテンポ）

    _lipSyncTimer = setInterval(()=>{
      if(audioEl.ended || audioEl.paused){ _stopLipSync(); return; }

      _lipSyncAnalyser.getByteFrequencyData(dataArray);

      // 母音帯域（200〜2000Hz）の音量を取得
      // fftSize=256 → binCount=128, bin幅≈172Hz → index1〜12≈172〜2064Hz
      let sum = 0, peak = 0;
      for(let i=1; i<13; i++){
        const v = dataArray[i];
        sum += v;
        if(v > peak) peak = v;
      }
      const avg = sum / (12 * 255);
      const pkN = peak / 255;

      // 現在の音量（0〜1）
      const volume = Math.min(1, pkN * 3.0 + avg * 1.0);

      if(volume > 0.05){
        // ─ 音がある: sinサイクルで強制開閉 ─
        _silenceCount = 0;
        _phase += CYCLE_SPEED;

        // |sin(phase)| → 0〜1の自然な開閉カーブ
        const cycle = Math.abs(Math.sin(_phase));

        // 底上げ: 0.2〜1.0の範囲で開閉（完全に閉じず、自然な話し方に）
        const targetOpen = (0.2 + 0.8 * cycle) * Math.min(1, volume * 2.0);

        // ゆっくり追従（半分のスピードで滑らかに）
        _mouthCur += (targetOpen - _mouthCur) * 0.35;

      } else {
        // ─ 無音: すばやく閉じる ─
        _silenceCount++;
        _phase = 0; // 次の発話でサイクルをリセット
        if(_silenceCount >= 2){
          _mouthCur = 0;
        } else {
          _mouthCur *= 0.2;
        }
      }

      // 閾値以下は完全クローズ
      const out = _mouthCur < 0.06 ? 0 : _mouthCur;
      _setMouth(out);
    }, 32); // 32ms≈30fps（半分の更新レートで動きをゆっくりに）

  }catch(e){
    console.warn('LipSync WebAudio error:', e);
    _startSimpleLipSync(audioEl);
  }
}

function _startSimpleLipSync(audioEl){
  // WebAudio非対応時のフォールバック: 話し言葉の開閉（短い開閉を繰り返す）
  // 日本語音節のリズム: 開→閉→開→閉 を素早く
  const pattern = [0.85,0.0,0.75,0.0,0.9,0.0,0.0,0.6,0.0,0.8,0.0,0.0,0.7,0.0,0.5,0.0];
  let idx = 0;
  _lipSyncTimer = setInterval(()=>{
    if(!audioEl || audioEl.ended || audioEl.paused){ _stopLipSync(); return; }
    _setMouth(pattern[idx % pattern.length]);
    idx++;
  }, 55); // 55ms間隔（約18fps）でパキパキ開閉
}

function _stopLipSync(){
  if(_lipSyncTimer){ clearInterval(_lipSyncTimer); _lipSyncTimer=null; }
  try{ if(_lipSyncAnalyser){ _lipSyncAnalyser.disconnect(); _lipSyncAnalyser=null; } }catch(e){}
  // 口を完全に閉じる（即座＋念押し4回）
  _setMouth(0);
  setTimeout(()=>{ _setMouth(0); }, 16);
  setTimeout(()=>{ _setMouth(0); }, 50);
  setTimeout(()=>{ _setMouth(0); }, 120);
  setTimeout(()=>{ _setMouth(0); }, 250);
}

function sendStamp(stamp){
  playSE_click();
  // パネルを閉じる
  stampPanelOpen=false;
  document.getElementById('stamp-panel').classList.remove('open');

  // 送信ユーザーバブル（画像）をチャットスクロールエリアに追加
  const area=_getChatScroll();
  if(area){
    const d=document.createElement('div');
    d.className='bubble-user';
    d.innerHTML=`<div class="bubble-user-inner" style="padding:4px;background:transparent;border:none;">
      <img src="${stamp.img}" style="width:80px;height:80px;object-fit:contain;" alt="${stamp.label}">
    </div>`;
    area.appendChild(d);
    area.scrollTop=area.scrollHeight;
  }

  // キャラアニメーション
  showStampOverlay(stamp.img);

  // アルエの返答をAIで生成
  chatHistory.push({role:'user', content:`[スタンプ: ${stamp.label}] ユーザーが「${stamp.label}」のスタンプを送ってきた`});

  // ローディング表示
  setLoading(true);

  // AI呼び出し（スタンプ専用プロンプト）
  callAIForStamp(stamp).then(response=>{
    const res_text = response.text || stamp.text;
    const res_emotion = response.emotion || stamp.emotion;
    updateAffection(response.affection_delta||0);
    chatHistory.push({role:'assistant', content:res_text});
    showCharMessage(res_text, res_emotion);
    speakText(res_text);
    playSE_receive();
  }).catch(()=>{
    // フォールバック: 固定テキスト
    showCharMessage(stamp.text, stamp.emotion);
    speakText(stamp.text);
    playSE_receive();
  }).finally(()=>{
    setLoading(false);
  });
}

function showStampOverlay(imgSrc){
  // 既存のオーバーレイを削除
  document.querySelectorAll('.stamp-sent-overlay').forEach(el=>el.remove());

  const overlay=document.createElement('div');
  overlay.className='stamp-sent-overlay';
  overlay.innerHTML=`<img src="${imgSrc}" class="stamp-anim-img" alt="stamp">`;
  document.body.appendChild(overlay);

  // 1.5秒後にフェードアウト
  setTimeout(()=>{
    const img=overlay.querySelector('.stamp-anim-img');
    if(img){
      img.classList.add('stamp-fade-out');
      img.addEventListener('animationend',()=>overlay.remove(),{once:true});
    }
  },1500);
}

function setBG(situId){
  const bgImg   = document.getElementById('bg-img');
  const bgVideo = document.getElementById('bg-video');
  if(!bgImg || !bgVideo) return;

  if(situId === 'daily'){
    // 動画背景
    const src = getDailyVideoSrc();
    // 既に同じ動画なら再設定不要
    if(bgVideo.getAttribute('data-src') !== src){
      bgVideo.src = src;
      bgVideo.setAttribute('data-src', src);
      bgVideo.load();
      bgVideo.play().catch(()=>{});
    }
    bgVideo.classList.add('active');
    bgImg.style.backgroundImage = 'none';
    bgImg.style.opacity = '0';
  } else {
    // 静止画背景
    const url = BG_IMAGES[situId];
    bgVideo.classList.remove('active');
    bgVideo.pause();
    if(url){
      bgImg.style.backgroundImage = `url('${url}')`;
      bgImg.style.opacity = '1';
    } else {
      bgImg.style.backgroundImage = 'none';
      bgImg.style.opacity = '0';
    }
  }
}

(function initSplash(){
  // ── キラキラパーティクルを生成 ──
  const particles = document.getElementById('splash-particles');
  if(particles){
    // 小さい星を20個
    for(let i=0;i<20;i++){
      const star = document.createElement('div');
      star.className = 'sp-star';
      const size = 4 + Math.random()*8;
      star.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        width:${size}px;height:${size}px;
        --dur:${1.5+Math.random()*2.5}s;
        --delay:${Math.random()*2}s;
      `;
      particles.appendChild(star);
    }
    // 光の玉を8個
    for(let i=0;i<8;i++){
      const orb = document.createElement('div');
      orb.className = 'sp-orb';
      const size = 10 + Math.random()*20;
      orb.style.cssText = `
        left:${Math.random()*90}%;
        top:${Math.random()*80}%;
        width:${size}px;height:${size}px;
        --dur:${2+Math.random()*3}s;
        --delay:${Math.random()*2.5}s;
      `;
      particles.appendChild(orb);
    }
  }

  // ── ローディングバーアニメ ──
  const bar = document.getElementById('splash-bar-fill');
  const barText = document.getElementById('splash-loading-text');
  const steps = [
    {w:20, t:'loading...'},
    {w:45, t:'connecting...'},
    {w:70, t:'preparing...'},
    {w:90, t:'almost ready...'},
    {w:100,t:'process...OK'},
  ];
  steps.forEach((s,i)=>{
    setTimeout(()=>{
      if(bar) bar.style.width = s.w+'%';
      if(barText) barText.textContent = s.t;
    }, 300 + i*380);
  });

  // スプラッシュのバーストはグローバル関数を使用（後ほど初期化）
  // ※ グローバルタップ処理は initGlobalTapFx() で一括管理

  // ── 起動音を再生し、再生完了後にスプラッシュを非表示 ──
  function hideSplashScreen(){
    const s = document.getElementById('splash');
    if(s){ s.classList.add('hide'); setTimeout(()=>{ s.style.display='none'; }, 1200); }
  }

  const startupAudio = new Audio('audio/startup.mp3');
  startupAudio.volume = 1.0;

  // 再生完了 → 次の画面へ
  startupAudio.addEventListener('ended', ()=>{
    hideSplashScreen();
  }, {once: true});

  // エラー時（音声読み込み失敗など）はフォールバックで2.4秒後に遷移
  startupAudio.addEventListener('error', ()=>{
    console.warn('起動音の読み込みに失敗しました。フォールバック遷移します。');
    setTimeout(hideSplashScreen, 2400);
  }, {once: true});

  // 再生開始（ブラウザの自動再生ポリシー対応）
  const playPromise = startupAudio.play();
  if(playPromise !== undefined){
    playPromise.catch(()=>{
      // 自動再生がブロックされた場合：最初のタップで再生開始
      function tryPlay(){
        startupAudio.play().then(()=>{
          document.removeEventListener('pointerdown', tryPlay, {capture:true});
          document.removeEventListener('touchstart', tryPlay, {capture:true});
        }).catch(()=>{});
      }
      document.addEventListener('pointerdown', tryPlay, {capture:true, once:true});
      document.addEventListener('touchstart', tryPlay, {capture:true, once:true});
      // 自動再生ブロック時は5秒後にフォールバック遷移
      setTimeout(()=>{
        if(document.getElementById('splash') && !document.getElementById('splash').classList.contains('hide')){
          hideSplashScreen();
        }
      }, 5000);
    });
  }

  // 保険: 30秒後にローディングオーバーレイ強制非表示（チャットUIはhideLoadingOverlay内で制御）
  setTimeout(()=>{ if(!_overlayHidden) hideLoadingOverlay(); }, 30000);
})();

/* ══════════════════════════════

(function initLoadingScreen(){
  // 落下キャラ画像リスト（5種類からランダム）
  const CHIBI_IMGS = [
    'img/loading_chars/char1.png',
    'img/loading_chars/char2.png',
    'img/loading_chars/char3.png',
    'img/loading_chars/char4.png',
    'img/loading_chars/char5.png',
  ];
  function randomChibiSrc(){ return CHIBI_IMGS[Math.floor(Math.random()*CHIBI_IMGS.length)]; }

  const pile   = document.getElementById('chibi-pile');
  const scoreEl = document.getElementById('loading-score-val');
  const overlay = document.getElementById('live2d-loading');
  if(!pile || !overlay) return;

  let score = parseInt(localStorage.getItem('loadingScore')||'0');
  let tapCount = 0;
  const MAX_PILED = 30; // 積み上げ最大数（これを超えたら古いものを削除）
  // 積み上げ座標管理: X列ごとの高さ
  const colH = {}; // key: colIndex, value: current height px

  function updateScore(v){
    score += v;
    localStorage.setItem('loadingScore', score);
    if(scoreEl){
      scoreEl.textContent = score;
      scoreEl.classList.remove('pop');
      void scoreEl.offsetWidth; // reflow
      scoreEl.classList.add('pop');
    }
  }
  // 初期スコア反映
  if(scoreEl) scoreEl.textContent = score;

  function spawnFallingChibi(startX){
    const el = document.createElement('div');
    el.className = 'falling-chibi';
    const img = document.createElement('img');
    const chosenSrc = randomChibiSrc(); // この落下キャラの画像を固定
    img.src = chosenSrc;
    el.appendChild(img);
    const w = window.innerWidth || 390;
    const h = window.innerHeight || 844;
    const size = 32 + Math.random() * 24;       // 32〜56px
    const rot  = (Math.random() - 0.5) * 60;    // -30〜+30度
    const flip = Math.random() < 0.5 ? -1 : 1;  // 左右反転
    const xPos = startX !== undefined
      ? Math.max(0, Math.min(w - size, startX - size/2))
      : Math.random() * (w - size);
    const spinDeg = (Math.random() - 0.5) * 720; // 着地までの回転量
    const fallDur = 0.55 + Math.random() * 0.35; // 0.55〜0.9秒

    el.style.cssText = `
      left:${xPos}px; top:-${size+10}px;
      width:${size}px; height:${size}px;
      transform:rotate(${rot}deg) scaleX(${flip});
    `;
    overlay.appendChild(el);

    // アニメーション: 落下
    const startTop = -(size + 10);
    const colKey = Math.round(xPos / 40); // 40px幅のカラム
    const pileH = colH[colKey] || 0;
    const landTop = h - size - pileH;
    const dist = landTop - startTop;

    let startTime = null;
    function fall(ts){
      if(!startTime) startTime = ts;
      const prog = Math.min(1, (ts - startTime) / (fallDur * 1000));
      // イージング: ease-in
      const ease = prog * prog;
      const curRot = rot + spinDeg * ease;
      const curY = startTop + dist * ease;
      el.style.transform = `translateY(${curY}px) rotate(${curRot}deg) scaleX(${flip})`;
      el.style.opacity   = Math.min(1, prog * 3).toString();

      if(prog < 1){
        requestAnimationFrame(fall);
      } else {
        // 着地 → 積み上げに変換（同じ画像を引き継ぐ）
        el.remove();
        landChibi(xPos, size, rot, flip, pileH, chosenSrc);
        colH[colKey] = pileH + size * 0.6; // 次のキャラが積まれる高さ
      }
    }
    requestAnimationFrame(fall);
  }

  function landChibi(xPos, size, rot, flip, pileH, src){
    const h = window.innerHeight || 844;
    const el = document.createElement('div');
    el.className = 'piled-chibi';
    const img = document.createElement('img');
    img.src = src || randomChibiSrc(); // 落下時の画像を引き継ぐ
    el.appendChild(img);

    // 少しランダムな傾きで着地（ごちゃっと積まれた感）
    const finalRot = (Math.random() - 0.5) * 25;
    el.style.cssText = `
      left:${xPos}px;
      bottom:${pileH}px;
      width:${size}px; height:${size}px;
      transform:rotate(${finalRot}deg) scaleX(${flip});
      transform-origin: bottom center;
    `;

    // スカッシュアニメ
    img.style.animation = 'none';
    el.style.transition = 'transform .15s ease';
    pile.appendChild(el);

    // 着地スカッシュ
    requestAnimationFrame(()=>{
      el.style.transform = `rotate(${finalRot}deg) scaleX(${flip * 1.3}) scaleY(0.6)`;
      setTimeout(()=>{
        el.style.transform = `rotate(${finalRot}deg) scaleX(${flip * 0.95}) scaleY(1.05)`;
        setTimeout(()=>{
          el.style.transform = `rotate(${finalRot}deg) scaleX(${flip}) scaleY(1)`;
        }, 80);
      }, 100);
    });

    // 周辺のpiled-chibiも少し揺らす
    const siblings = pile.querySelectorAll('.piled-chibi');
    siblings.forEach((s, i)=>{
      if(s !== el && i >= siblings.length - 5){
        s.style.transition = 'transform .12s ease';
        const cr = parseFloat(s.style.transform.match(/rotate\(([-\d.]+)deg\)/)?.[1]||'0');
        const jitter = (Math.random()-0.5)*8;
        s.style.transform = s.style.transform.replace(/rotate\([^)]+\)/,`rotate(${cr+jitter}deg)`);
        setTimeout(()=>{
          s.style.transform = s.style.transform.replace(/rotate\([^)]+\)/,`rotate(${cr}deg)`);
        }, 200);
      }
    });

    updateScore(10);
    tapCount++;

    // 積み上げ上限を超えたら最も古いものを削除
    const piled = pile.querySelectorAll('.piled-chibi');
    if(piled.length > MAX_PILED){
      const removeCount = piled.length - MAX_PILED;
      for(let i = 0; i < removeCount; i++){
        piled[i].remove();
      }
    }
  }

  // タップ/クリック: 指の位置からランダムに落下
  overlay.addEventListener('pointerdown', (e)=>{
    if(e.target && e.target.closest('#l2d-bar, #l2d-bar-wrap, .l2d-sub')) return;
    const x = e.clientX;
    // タップSE（ポップ音）
    try{
      const ctx = window.audioCtx || (window.audioCtx = new (window.AudioContext||window.webkitAudioContext)());
      if(ctx.state==='suspended') ctx.resume();
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(1000,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1500,ctx.currentTime+0.04);
      g.gain.setValueAtTime(0.22,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      o.start(ctx.currentTime); o.stop(ctx.currentTime+0.12);
    }catch(ex){}
    // 1タップで1〜2体
    spawnFallingChibi(x + (Math.random()-0.5)*60);
    if(Math.random() < 0.4) spawnFallingChibi(x + (Math.random()-0.5)*80);
  });

  // 停止関数
  window._stopChibiStack = ()=>{ /* ローディング終了時は何もしない */ };
})();

async function initLive2D(){
  const wrap=document.getElementById('live2d-canvas-wrap');
  const charArea=document.getElementById('character-area');
  const W=charArea.clientWidth||window.innerWidth;
  const H=charArea.clientHeight||window.innerHeight*0.7;

  setLoadingProgress(10,'INITIALIZING RENDERER...');

  pixiApp=new PIXI.Application({
    width:W,height:H,
    backgroundAlpha:0,
    antialias:true,
    autoDensity:true,
    resolution:window.devicePixelRatio||1,
  });
  wrap.appendChild(pixiApp.view);
  setLoadingProgress(25,'RENDERER READY');

  new ResizeObserver(()=>{
    const nw=charArea.clientWidth,nh=charArea.clientHeight;
    if(nw>0&&nh>0){
      pixiApp.renderer.resize(nw,nh);
      if(live2dModel) placeModel(nw,nh);
    }
  }).observe(charArea);

  try{
    if(!window.PIXI||!PIXI.live2d) throw new Error('pixi-live2d-display not loaded');
    setLoadingProgress(40,'LOADING MODEL DATA...');

    const mp=PIXI.live2d.Live2DModel.from(MODEL_PATH,{onError:(e)=>console.error(e)});
    let prog=40;
    const iv=setInterval(()=>{
      if(prog<84){prog+=2;setLoadingProgress(prog,prog<62?'LOADING TEXTURE (40MB)...':'PROCESSING MODEL...');}
    },350);

    live2dModel=await mp;
    clearInterval(iv);
    setLoadingProgress(94,'PLACING MODEL...');
    pixiApp.stage.addChild(live2dModel);
    placeModel(W,H);
    setLoadingProgress(100,'COMPLETE!');
    document.getElementById('ai-status').textContent='LIVE2D ✓';

    // canvas要素が確実に表示されるよう visibility を明示
    if(pixiApp.view){
      pixiApp.view.style.visibility = 'visible';
      pixiApp.view.style.opacity = '1';
    }

    setTimeout(()=>hideLoadingOverlay(),600);

  }catch(err){
    console.warn('Live2D failed:',err.message);
    setLoadingProgress(100,'FALLBACK MODE');
    setTimeout(()=>hideLoadingOverlay(),500);
    startFallback(W,H);
  }
}

function placeModel(W,H){
  if(!live2dModel) return;
  const mw=live2dModel.internalModel.originalWidth||512;
  const mh=live2dModel.internalModel.originalHeight||512;

  // ── バストアップ固定 ──
  // anchor(0.5, 0.28): モデルの胸部付近をピボットに
  // scale*2.0: 上半身が画面の大部分を占める大きさ
  // X: 常に中央（タップ・ドラッグでずれない）
  // Y: anchor=0.28なのでモデルの頭頂が画面上方に来る
  // バストアップ表示：頭頂〜胸〜腰あたりが画面に収まるよう調整
  // anchor(0.5, 0.18): モデルの頭部付近をピボットに
  live2dModel.anchor.set(0.5, 0.18);
  const baseScale = Math.min(W / mw, H / mh) * 1.82 * modelScale;
  live2dModel.scale.set(baseScale);
  live2dModel.x = W / 2;
  live2dModel.y = H * 0.30 + modelOffsetY;
}

/* ══════════════════════════════
   Fallback
══════════════════════════════ */
function startFallback(W,H){
  const g=new PIXI.Graphics(); pixiApp.stage.addChild(g);
  let t=0,cur={eye:1,mouth:.1,blush:0},tgt={eye:1,mouth:.1,blush:0};
  const FM={neutral:{eye:1,mouth:.1,blush:0},happy:{eye:.8,mouth:.7,blush:.5},love:{eye:.65,mouth:.6,blush:1},shy:{eye:.85,mouth:.3,blush:.9},sad:{eye:1.1,mouth:.15,blush:0},surprised:{eye:1.4,mouth:.8,blush:.3},angry:{eye:.75,mouth:.45,blush:.35}};
  window._fallbackSetExpr=k=>{tgt={...(FM[k]||FM.neutral)};};
  window._fallbackSetMouth=v=>{tgt.mouth=Math.max(0.05,Math.min(1,v));};
  pixiApp.ticker.add(()=>{
    t+=.016;
    ['eye','mouth','blush'].forEach(k=>{cur[k]+=(tgt[k]-cur[k])*.1;});
    const cw=pixiApp.renderer.width,ch=pixiApp.renderer.height;
    const cx=cw/2,cy=ch*.55+modelOffsetY,R=Math.min(cw,ch)*.28;
    const bY=Math.sin(t*1.2)*3,blT=t%4,eyeH=blT<3.75?cur.eye:Math.max(.05,1-(blT-3.75)*20);
    g.clear();
    g.beginFill(0x2a0a4a);g.drawEllipse(cx,cy+bY,R*1.15,R*1.35);g.endFill();
    g.beginFill(0xFFD8C0);g.drawEllipse(cx,cy+bY,R,R*1.05);g.endFill();
    if(cur.blush>.1){g.beginFill(0xFF9999,cur.blush*.35);g.drawEllipse(cx-R*.42,cy+bY+R*.15,R*.2,R*.1);g.drawEllipse(cx+R*.42,cy+bY+R*.15,R*.2,R*.1);g.endFill();}
    g.beginFill(0x1a0a3a);g.drawEllipse(cx-R*.3,cy+bY-R*.1,R*.16,R*.12*eyeH);g.endFill();
    g.beginFill(0xFFFFFF,.5);g.drawEllipse(cx-R*.25,cy+bY-R*.14,R*.04,R*.04);g.endFill();
    g.beginFill(0x1a0a3a);g.drawEllipse(cx+R*.3,cy+bY-R*.1,R*.16,R*.12*eyeH);g.endFill();
    g.beginFill(0xFFFFFF,.5);g.drawEllipse(cx+R*.25,cy+bY-R*.14,R*.04,R*.04);g.endFill();
    g.beginFill(0xFF6688);g.drawEllipse(cx,cy+bY+R*.3,R*.2,Math.max(R*.02,R*.075*cur.mouth));g.endFill();
    g.beginFill(0x4a1a7a);
    g.moveTo(cx-R*.75,cy+bY-R*.85);
    g.bezierCurveTo(cx-R*.5,cy+bY-R*1.35,cx+R*.5,cy+bY-R*1.35,cx+R*.75,cy+bY-R*.85);
    g.lineTo(cx+R*.42,cy+bY-R*.2);
    g.bezierCurveTo(cx+R*.2,cy+bY-R*.65,cx-R*.2,cy+bY-R*.65,cx-R*.42,cy+bY-R*.2);
    g.closePath();g.endFill();
  });
}

/* ══════════════════════════════
   タップ・スワイプ操作
══════════════════════════════ */
(function setupTapControls(){

  const overlay=document.getElementById('tap-overlay');

  let lastDist=0;
  let dragStartY=null,dragStartOffset=0;
  let tapStartX=0,tapStartY=0,tapStartTime=0;
  let isDragging=false;

  // ── タッチ ──
  overlay.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      lastDist=getTouchDist(e.touches);
      dragStartY=null; // ピンチ中はドラッグキャンセル
      isDragging=false;
    } else if(e.touches.length===1){
      tapStartX=e.touches[0].clientX;
      tapStartY=e.touches[0].clientY;
      tapStartTime=Date.now();
      dragStartY=e.touches[0].clientY;
      dragStartOffset=modelOffsetY; // ドラッグ開始時のoffsetを記録
      isDragging=false;
    }
  },{passive:true});

  overlay.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=getTouchDist(e.touches);
      if(lastDist>0){
        const ratio=d/lastDist;
        modelScale=Math.min(Math.max(modelScale*ratio,0.3),3.0);
        refreshModel();
      }
      lastDist=d;
      isDragging=true;
    } else if(e.touches.length===1 && dragStartY!==null){
      const dy=e.touches[0].clientY-dragStartY;
      if(Math.abs(dy)>8) isDragging=true; // 8px以上で初めてドラッグと判定
      if(isDragging){
        // dragStartOffsetからの相対移動のみ適用（毎フレームdragStartYから計算）
        modelOffsetY=Math.min(Math.max(dragStartOffset+dy,-300),300);
        refreshModel();
      }
    }
  },{passive:true});

  overlay.addEventListener('touchend',e=>{
    if(e.changedTouches.length>0){
      const elapsed=Date.now()-tapStartTime;
      const dx=e.changedTouches[0].clientX-tapStartX;
      const dy=e.changedTouches[0].clientY-tapStartY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      // タップ判定：移動量10px以内 && 300ms以内 && ドラッグ未実行
      if(!isDragging && dist<10 && elapsed<300){
        const rect=overlay.getBoundingClientRect();
        playSE_click();
      }
    }
    lastDist=0; dragStartY=null; isDragging=false;
  },{passive:true});

  // ── マウス ──
  let mouseDown=false;
  overlay.addEventListener('mousedown',e=>{
    tapStartX=e.clientX; tapStartY=e.clientY;
    tapStartTime=Date.now();
    dragStartY=e.clientY; dragStartOffset=modelOffsetY;
    isDragging=false;
    mouseDown=true;
    document.body.classList.add('dragging-model');
  });
  document.addEventListener('mousemove',e=>{
    if(!mouseDown) return;
    const dy=e.clientY-dragStartY;
    if(Math.abs(dy)>5) isDragging=true;
    if(isDragging){
      modelOffsetY=Math.min(Math.max(dragStartOffset+dy,-300),300);
      refreshModel();
    }
  });
  document.addEventListener('mouseup',e=>{
    if(mouseDown){
      const elapsed=Date.now()-tapStartTime;
      const dx=e.clientX-tapStartX,dy=e.clientY-tapStartY;
      if(!isDragging && Math.sqrt(dx*dx+dy*dy)<10 && elapsed<200){
        const rect=overlay.getBoundingClientRect();
        playSE_click();
      }
    }
    dragStartY=null;isDragging=false;mouseDown=false;
    document.body.classList.remove('dragging-model');
  });

  // ホイールズーム
  overlay.addEventListener('wheel',e=>{
    e.preventDefault();
    modelScale=Math.min(Math.max(modelScale-(e.deltaY>0?0.05:-0.05),0.3),3.0);
    refreshModel();
  },{passive:false});
})();

function getTouchDist(touches){
  const dx=touches[0].clientX-touches[1].clientX;
  const dy=touches[0].clientY-touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

async function sendMessage(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||isLoading) return;
  input.value='';input.style.height='auto';
  closeError();
  playSE_send();
  addUserBubble(text);
  chatHistory.push({role:'user',content:text});
  // 履歴が長くなりすぎないよう制限
  if(chatHistory.length>20) chatHistory=chatHistory.slice(-20);
  setLoading(true);

  try{
    let response=null;
    try{
      response=await callAI(text);
    }catch(e){
      console.warn('API failed, using offline fallback:',e.message);
      response=generateOfflineResponse(text);
    }
    // responseが配列の場合も対処
    if(Array.isArray(response)) response=response[Math.floor(Math.random()*response.length)];
    if(!response||typeof response!=='object') response={text:'えへへ、うまく聞こえなかったかも。もう一回言って♪',emotion:'neutral',affection_delta:0};

    const res_text    = response.text  || 'えへへ…ちょっと難しかったかも。もう一度話しかけて？';
    const res_text2   = response.text2 || null; // 分割2つ目（あれば）
    const res_emotion = response.emotion || 'neutral';
    updateAffection(response.affection_delta||0);

    // ミニルーム：チャット経験値＆装備ドロップ判定
    if(typeof window.onChatMessage === 'function') window.onChatMessage();

    if(res_text2){
      // ── 2メッセージ分割パターン ──
      chatHistory.push({role:'assistant', content: res_text + ' ' + res_text2});

      // 1つ目: バブル表示 + TTS再生（話し切るまでawait）
      showCharMessage(res_text, res_emotion, true); // skipTTS=true（自前でTTS制御）
      playSE_receive();
      await speakText(res_text); // ← 話し終わるまで待つ

      // 話し終わったらタイピング演出（0.3〜0.6秒）
      const ti = document.getElementById('typing-indicator');
      if(ti){ ti.classList.add('show'); }
      await new Promise(r => setTimeout(r, 300 + Math.random()*300));
      if(ti){ ti.classList.remove('show'); }

      // 2つ目: バブル表示 + TTS
      showCharMessage(res_text2, res_emotion, false);
      playSE_receive();
    } else {
      // ── 通常1メッセージ ──
      chatHistory.push({role:'assistant', content: res_text});
      showCharMessage(res_text, res_emotion);
      playSE_receive();
    }
  }catch(e){
    console.error('sendMessage error:',e);
    // エラーが起きても必ずフォールバック表示
    const fb=generateOfflineResponse(text);
    const fbObj=Array.isArray(fb)?fb[0]:fb;
    showCharMessage(fbObj.text||'ごめんね、うまく聞こえなかったかも？',fbObj.emotion||'neutral');
  }finally{
    // 必ずloading解除
    setLoading(false);
  }
}

JSON形式のみで返答:

<script>
/* ══════════════════════════════════════════════
   グローバルタップキラキラエフェクト（全画面）
══════════════════════════════════════════════ */
(function initGlobalTapFx(){
  const tapFx = document.getElementById('global-tap-fx');
  if(!tapFx) return;

  const COLORS  = ['#FF80CC','#CC80FF','#80C8FF','#FFD080','#FF80AA','#A0DDFF','#FFB3DE','#FFAAEE'];
  const EMOJIS  = ['✦','★','✸','✺','✿','♥'];

  function spawnBurst(x, y){
    const burst = document.createElement('div');
    burst.className = 'tap-burst';
    burst.style.left = x + 'px';
    burst.style.top  = y + 'px';

    const count = 7 + Math.floor(Math.random()*5); // 7〜11個（小さめ）
    for(let i = 0; i < count; i++){
      const angle = (360 / count) * i + Math.random()*25 - 12;
      const dist  = 25 + Math.random()*35; // 飛距離（小さく）
      const rad   = angle * Math.PI / 180;
      const tx    = Math.round(Math.cos(rad) * dist);
      const ty    = Math.round(Math.sin(rad) * dist);
      const col   = COLORS[Math.floor(Math.random()*COLORS.length)];
      const sz    = (4 + Math.random()*5).toFixed(1) + 'px'; // 4〜9px（小さく）
      const dur   = (0.45 + Math.random()*0.35).toFixed(2) + 's';
      const delay = (Math.random()*0.06).toFixed(2) + 's';
      const rot   = Math.round(Math.random()*360) + 'deg';

      if(Math.random() < 0.28){
        const el = document.createElement('span');
        el.className = 'tb-heart';
        el.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
        el.style.cssText = `--sz:${sz};--col:${col};--tx:${tx}px;--ty:${ty}px;--dur:${dur};--delay:${delay};--rot:${rot};color:${col};`;
        burst.appendChild(el);
      } else {
        const el = document.createElement('div');
        el.className = 'tb-star';
        el.style.cssText = `--sz:${sz};--col:${col};--tx:${tx}px;--ty:${ty}px;--dur:${dur};--delay:${delay};--rot:${rot};`;
        burst.appendChild(el);
      }
    }

    tapFx.appendChild(burst);
    setTimeout(()=>{ if(burst.parentNode) burst.remove(); }, 900);
  }

  // window全体にキャプチャフェーズで登録（どの画面でも反応）
  window.addEventListener('pointerdown', (e)=>{
    spawnBurst(e.clientX, e.clientY);
  }, {capture: true, passive: true});

  // モバイル touchstart（pointer未対応端末向け）
  window.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    if(t) spawnBurst(t.clientX, t.clientY);
  }, {capture: true, passive: true});

})();
</script>

/* ── セーブデータ ── */
function loadData(){
  try{ return JSON.parse(localStorage.getItem('mrData')||'null') || defaultData(); }
  catch(e){ return defaultData(); }
}
function defaultData(){
  return {
    gold:0, exp:0, lv:1, expToNext:20,
    hp:30, maxHp:30, atk:1, dfs:1, spd:1, mp:1,
    equip:{weapon:null,armor:null},
    inventory:{},
    stamina:200, staminaMax:200,
    staminaRecoverDate:'',
    battleCount:0, battleDate:'',
  };
}
function saveData(d){ localStorage.setItem('mrData', JSON.stringify(d)); }

let D = loadData();

/* ── スタミナシステム (max200, 1回40消費, 00:00回復) ── */
function getTodayStr(){ return new Date().toISOString().slice(0,10); }

function recoverStaminaIfNewDay(){
  const today = getTodayStr();
  if(D.staminaRecoverDate !== today){
    D.stamina = D.staminaMax;
    D.staminaRecoverDate = today;
    saveData(D);
  }
}

function canBattle(){
  recoverStaminaIfNewDay();
  return D.stamina >= 40;
}

// 旧関数互换性維持
function getBattlesLeft(){
  recoverStaminaIfNewDay();
  return Math.floor(D.stamina / 40);
}

/* ── ステータス計算（装備込み） ── */
function calcStats(){
  let s = {hp:D.maxHp, atk:D.atk, dfs:D.dfs, spd:D.spd, mp:D.mp};
  ['weapon','armor'].forEach(slot=>{
    const id = D.equip[slot];
    if(!id) return;
    const cat = slot==='weapon'?SHOP_ITEMS.weapon:SHOP_ITEMS.armor;
    const item = cat.find(x=>x.id===id);
    if(!item) return;
    Object.entries(item.stats).forEach(([k,v])=>{ s[k]=(s[k]||0)+v; });
  });
  return s;
}

/* ── ステータスUI更新 ── */
function updateStatsUI(){
  recoverStaminaIfNewDay();
  const s = calcStats();
  document.getElementById('mr-lv-badge').textContent  = 'LV '+D.lv;
  document.getElementById('mr-gold-badge').textContent = D.gold+' G';
  document.getElementById('mr-hp-stat').textContent  = 'HP '+s.hp;
  document.getElementById('mr-atk-stat').textContent = 'ATK '+s.atk;
  document.getElementById('mr-dfs-stat').textContent = 'DFS '+s.dfs;
  document.getElementById('mr-spd-stat').textContent = 'SPD '+s.spd;
  document.getElementById('mr-mp-stat').textContent  = 'MP '+s.mp;
  // EXPバー
  const expPct = Math.min(100, Math.round(D.exp/D.expToNext*100));
  document.getElementById('mr-exp-bar-fill').style.width = expPct+'%';
  const expNext = document.getElementById('mr-exp-next-label');
  if(expNext) expNext.textContent = D.exp+'/'+D.expToNext;
  // スタミナバー
  const stmPct = Math.min(100, Math.round(D.stamina/D.staminaMax*100));
  const stmFill = document.getElementById('mr-stamina-bar-fill');
  if(stmFill){
    stmFill.className = '';
    if(stmPct<=0) stmFill.classList.add('empty');
    else if(stmPct<=40) stmFill.classList.add('low');
    stmFill.style.width = stmPct+'%';
  }
  const stmVal = document.getElementById('mr-stamina-val');
  if(stmVal) stmVal.textContent = D.stamina+'/'+D.staminaMax;
  // バトルボタンスタミナ表示
  const btn = document.getElementById('mr-battle-btn');
  if(btn){
    if(D.stamina>=40){
      btn.textContent = `BATTLE  STM ${D.stamina}`;
      btn.disabled = false;
    } else {
      btn.textContent = 'BATTLE  STM 不足';
      btn.disabled = true;
    }
  }
}

/* ── 経験値加算（チャットから呼ぶ） ── */
window.addChatExp = function(amount){
  D.exp += amount;
  while(D.exp >= D.expToNext){
    D.exp -= D.expToNext;
    D.lv++;
    D.expToNext = Math.round(D.expToNext * 1.6);
    // LVアップ時は小幅増加のみ（普段は5会話ごとのランダムアップで成長）
    D.maxHp += 2; D.atk += 1; D.dfs += 1; D.spd += 1; D.mp += 1;
    showDropToast(`✨ LV UP! LV${D.lv}になった！`, 2500);
  }
  saveData(D);
  if(document.getElementById('miniroom-overlay').classList.contains('show')) updateStatsUI();
};

      'transition:opacity .25s, transform .25s',
      'white-space:nowrap',
      'box-shadow:0 0 10px rgba(0,180,255,.35)',
    ].join(';');
    document.body.appendChild(el);
  }
  el.textContent = text;
  requestAnimationFrame(()=>{
    el.style.opacity  = '1';
    el.style.transform = 'translateY(0)';
  });
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>{
    el.style.opacity   = '0';
    el.style.transform = 'translateY(-6px)';
  }, 1800);
}

/* ── 5会話ごとにランダムステータス+1〜3 ── */
const STAT_KEYS = ['maxHp','atk','dfs','spd','mp'];
const STAT_LABELS = {maxHp:'HP',atk:'ATK',dfs:'DEF',spd:'SPD',mp:'MP'};

function randomStatUp(){
  const key  = STAT_KEYS[Math.floor(Math.random() * STAT_KEYS.length)];
  const gain = 1 + Math.floor(Math.random() * 3);
  D[key] = (D[key]||1) + gain;
  if(key === 'maxHp') D.hp = Math.min((D.hp||1) + gain, D.maxHp);
  saveData(D);
  if(document.getElementById('miniroom-overlay').classList.contains('show')) updateStatsUI();
  showStatNotice(`${STAT_LABELS[key]} +${gain}`);
}

/* ── チャットから装備ドロップ（20回に1回）── */
let _chatCount = parseInt(localStorage.getItem('chatCount')||'0');
window.onChatMessage = function(){
  _chatCount++;
  localStorage.setItem('chatCount', _chatCount);
  // 経験値 +1〜2（控えめ）
  addChatExp(1 + Math.floor(Math.random()*2));
  // 5回に1回ランダムステータスアップ
  if(_chatCount % 5 === 0){
    randomStatUp();
  }
  // 20回に1回装備ドロップ
  if(_chatCount % 20 === 0){
    const allItems = [...SHOP_ITEMS.weapon, ...SHOP_ITEMS.armor];
    const weights = allItems.map(i=>i.rarity==='SSR'?1:i.rarity==='SR'?4:i.rarity==='R'?12:20);
    const total = weights.reduce((a,b)=>a+b,0);
    let rand = Math.random()*total;
    let item = allItems[0];
    for(let i=0;i<allItems.length;i++){ rand-=weights[i]; if(rand<=0){item=allItems[i];break;} }
    if(!D.inventory[item.id]) D.inventory[item.id] = 0;
    D.inventory[item.id]++;
    saveData(D);
    showDropToast(`🎁 装備ドロップ! 「${item.name}」[${item.rarity}]`, 3500);
  }
};
