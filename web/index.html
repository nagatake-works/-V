/* ── バトル ── */
let _battle = null;
const SKILLS = {
  'マジックボルト':   {mp:8,  dmgMul:1.6},
  'ホーリーブレード': {mp:12, dmgMul:2.2},
  'スターバースト':   {mp:15, dmgMul:2.5},
};

window.openBattle = function(){
  if(!canBattle()) return;
  const s = calcStats();
  // 適正レベルの敵をランダム選択（LVで絞る）
  const maxLv = Math.max(1, Math.min(D.lv+2, ENEMIES.length));
  const pool = ENEMIES.filter(e=>e.lv<=maxLv);
  const enemy = JSON.parse(JSON.stringify(pool[Math.floor(Math.random()*pool.length)]));

  _battle = {
    playerMaxHp: s.hp, playerHp: s.hp, playerMp: s.mp,
    enemyMaxHp: enemy.hp, enemyHp: enemy.hp,
    enemy, stats: s, over: false,
  };

  document.getElementById('bf-enemy-emoji').textContent = enemy.emoji;
  document.getElementById('bf-enemy-name').textContent  = enemy.name + ' LV'+enemy.lv;
  updateBattleHP();
  clearBattleLog();
  addBattleLog(`${enemy.name}が現れた！`);

  // スキルボタン（装備スキルがあれば有効化）
  const wepId = D.equip.weapon;
  const wepItem = wepId ? SHOP_ITEMS.weapon.find(x=>x.id===wepId) : null;
  const skillBtn = document.getElementById('battle-skill-btn');
  if(wepItem&&wepItem.skill){
    skillBtn.textContent = `✨ ${wepItem.skill.name}`;
    skillBtn.disabled = false;
  } else {
    skillBtn.textContent = '✨ スキルなし';
    skillBtn.disabled = true;
  }
  document.getElementById('battle-btns').style.display='flex';
  document.getElementById('battle-result-wrap').classList.remove('show');
  document.getElementById('battle-modal').classList.add('show');
};

window.closeBattle = function(){
  document.getElementById('battle-modal').classList.remove('show');
  _battle = null;
  updateStatsUI();
};

function updateBattleHP(){
  if(!_battle) return;
  const pp = _battle.playerHp/_battle.playerMaxHp*100;
  const ep = _battle.enemyHp/_battle.enemyMaxHp*100;
  const phpEl = document.getElementById('bf-player-hp');
  phpEl.style.width = pp+'%';
  phpEl.className = 'battle-hp-fill'+(pp<25?' critical':pp<50?' low':'');
  document.getElementById('bf-player-hp-txt').textContent = Math.max(0,_battle.playerHp)+'/'+_battle.playerMaxHp;
  const ehpEl = document.getElementById('bf-enemy-hp');
  ehpEl.style.width = ep+'%';
  ehpEl.className = 'battle-hp-fill'+(ep<25?' critical':ep<50?' low':'');
  document.getElementById('bf-enemy-hp-txt').textContent = Math.max(0,_battle.enemyHp)+'/'+_battle.enemyMaxHp;
}

function addBattleLog(msg){
  const log = document.getElementById('battle-log');
  const el = document.createElement('div');
  el.className = 'battle-log-entry';
  el.textContent = msg;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}
function clearBattleLog(){ document.getElementById('battle-log').innerHTML=''; }

function setBattleActionsDisabled(v){
  ['battle-attack-btn','battle-skill-btn','battle-flee-btn'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.disabled=v;
  });
}

window.battleAction = function(type){
  if(!_battle||_battle.over) return;
  setBattleActionsDisabled(true);

  const s = _battle.stats;
  let playerDmg = 0;
  let logMsg = '';

  if(type==='attack'){
    playerDmg = Math.max(1, s.atk - Math.floor(_battle.enemy.dfs*0.5) + Math.floor(Math.random()*8)-3);
    logMsg = `アルエの攻撃！ ${_battle.enemy.name}に${playerDmg}ダメージ`;
  } else if(type==='skill'){
    const wepId = D.equip.weapon;
    const wepItem = wepId ? SHOP_ITEMS.weapon.find(x=>x.id===wepId) : null;
    if(wepItem&&wepItem.skill&&_battle.playerMp>=SKILLS[wepItem.skill.name]?.mp){
      const sk = SKILLS[wepItem.skill.name];
      _battle.playerMp -= sk.mp;
      playerDmg = Math.max(1, Math.floor(s.atk * sk.dmgMul) - Math.floor(_battle.enemy.dfs*0.3));
      logMsg = `✨ ${wepItem.skill.name}！ ${playerDmg}ダメージ！`;
    } else {
      addBattleLog('MPが足りない…');
      setBattleActionsDisabled(false);
      return;
    }
  } else if(type==='flee'){
    const fleeChance = 0.35 + (s.spd - _battle.enemy.dfs)*0.01;
    if(Math.random() < fleeChance){
      addBattleLog('逃げ出した！');
      _battle.over = true;
      setTimeout(()=>showBattleResult(false, true), 600);
      return;
    } else {
      addBattleLog('逃げられなかった…');
      playerDmg = 0;
    }
  }

  _battle.enemyHp -= playerDmg;
  if(logMsg) addBattleLog(logMsg);
  updateBattleHP();

  if(_battle.enemyHp <= 0){
    _battle.over = true;
    addBattleLog(`${_battle.enemy.name}を倒した！`);
    setTimeout(()=>showBattleResult(true, false), 700);
    return;
  }

  // 敵の反撃
  setTimeout(()=>{
    if(!_battle||_battle.over) return;
    const atkSpd = s.spd;
    const dodge = Math.min(0.35, atkSpd*0.02);
    if(Math.random() < dodge){
      addBattleLog(`${_battle.enemy.name}の攻撃を回避！`);
    } else {
      const enemyDmg = Math.max(1, _battle.enemy.atk - Math.floor(s.dfs*0.5) + Math.floor(Math.random()*6)-2);
      _battle.playerHp -= enemyDmg;
      addBattleLog(`${_battle.enemy.name}の反撃！ ${enemyDmg}ダメージを受けた`);
      updateBattleHP();
    }

    if(_battle.playerHp<=0){
      _battle.over=true;
      addBattleLog('力尽きた…');
      setTimeout(()=>showBattleResult(false, false), 700);
    } else {
      setBattleActionsDisabled(false);
    }
  }, 900);
};

function showBattleResult(win, fled){
  // スタミナ40消費
  D.stamina = Math.max(0, D.stamina - 40);
  D.battleCount++;
  D.battleDate = getTodayStr();
  const resultWrap = document.getElementById('battle-result-wrap');
  const resultTitle = document.getElementById('battle-result-title');
  const resultReward = document.getElementById('battle-result-reward');
  document.getElementById('battle-btns').style.display='none';
  resultWrap.classList.add('show');
  if(win){
    const goldGain = _battle.enemy.gold + Math.floor(Math.random()*10);
    const expGain  = _battle.enemy.exp;
    D.gold += goldGain;
    addChatExp(expGain);
    saveData(D);
    resultTitle.textContent = '✨ WIN!';
    resultTitle.className = 'battle-result-title win';
    resultReward.textContent = `+${goldGain}G  +${expGain}EXP 獲得！`;
  } else if(fled){
    saveData(D);
    resultTitle.textContent = '💨 FLED';
    resultTitle.className = 'battle-result-title';
    resultReward.textContent = '';
  } else {
    saveData(D);
    resultTitle.textContent = '💀 LOSE';
    resultTitle.className = 'battle-result-title lose';
    resultReward.textContent = '次は勝てる…はず！';
  }
}

/* ── ショップ ── */
let _shopTab = 'weapon';
window.openShop = function(){
  document.getElementById('shop-gold-display').textContent = D.gold+'G';
  renderShopList();
  document.getElementById('shop-modal').classList.add('show');
};
window.closeShop = function(){
  document.getElementById('shop-modal').classList.remove('show');
  updateStatsUI();
};
window.switchShopTab = function(tab){
  _shopTab = tab;
  ['weapon','armor','item'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  renderShopList();
};

function renderShopList(){
  const list = document.getElementById('shop-list');
  list.innerHTML = '';
  const items = SHOP_ITEMS[_shopTab] || [];
  items.forEach(item=>{
    const owned = (D.inventory[item.id]||0) > 0;
    const equipped = D.equip[_shopTab] === item.id;
    const canAfford = D.gold >= item.price;
    const div = document.createElement('div');
    div.className = `shop-item rarity-${item.rarity}${equipped?' equipped':''}${(!owned&&!canAfford)?' cant-afford':''}`;

    let statsText = Object.entries(item.stats).map(([k,v])=>`${k.toUpperCase()}+${v}`).join('  ');
    let skillText = item.skill ? `⚡ スキル: ${item.skill.name}` : '';
    let priceDisplay = equipped
      ? `<div class="shop-item-price"><span class="equipped-label">✓ 装備中</span></div>`
      : owned
        ? `<div class="shop-item-price"><button style="background:linear-gradient(135deg,#40ff80,#20cc60);border:none;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;color:#fff" onclick="equipItem('${_shopTab}','${item.id}',event)">装備する</button></div>`
        : item.consumable
          ? `<div class="shop-item-price">${item.price}G</div>`
          : `<div class="shop-item-price">${item.price}G</div>`;

    div.innerHTML = `
      <div class="shop-item-icon">${item.icon}</div>
      <div class="shop-item-info">
        <div class="shop-item-name">[${item.rarity}] ${item.name}</div>
        <div class="shop-item-desc">${item.desc}</div>
        ${statsText?`<div class="shop-item-stats">${statsText}</div>`:''}
        ${skillText?`<div class="shop-item-skill">${skillText}</div>`:''}
      </div>
      ${priceDisplay}
    `;
    if(!equipped && !owned && canAfford){
      div.onclick = ()=>buyItem(_shopTab, item.id);
    } else if(!equipped && !owned && !canAfford && !item.consumable){
      div.style.cursor='default';
    }
    list.appendChild(div);
  });
}

window.buyItem = function(cat, id){
  const items = SHOP_ITEMS[cat];
  const item = items.find(x=>x.id===id);
  if(!item) return;
  if(D.gold < item.price){ showDropToast('Gが足りない！'); return; }
  D.gold -= item.price;
  if(!D.inventory[id]) D.inventory[id]=0;
  D.inventory[id]++;
  saveData(D);
  document.getElementById('shop-gold-display').textContent = D.gold+'G';
  showDropToast(`「${item.name}」を購入した！`);
  renderShopList();
};

window.equipItem = function(cat, id, e){
  if(e) e.stopPropagation();
  D.equip[cat] = id;
  saveData(D);
  renderShopList();
  updateStatsUI();
  const item = (SHOP_ITEMS[cat]||[]).find(x=>x.id===id);
  if(item) showDropToast(`「${item.name}」を装備した！`);
};

updateStatsUI();

/* ── ミニキャラウィジェット（チャット画面右下）── */
(function initMiniCharaWidget(){
  const img = document.getElementById('mc-img');
  const lvBadge = document.getElementById('mc-lv-badge');
  if(!img) return;

  // LVバッジをデータと同期
  function syncLv(){
    const d = loadData();
    if(lvBadge) lvBadge.textContent = 'LV ' + d.lv;
  }
  syncLv();

  // updateStatsUI をフックしてLVバッジも更新
  const _origUpdateStats = updateStatsUI;
  window.updateStatsUI = function(){
    _origUpdateStats();
    syncLv();
  };

  // アイドルアニメ（ゆったり浮遊）
  img.style.animation = 'mcIdle 2.8s ease-in-out infinite';

  let _jumping = false;

  function doJump(){
    if(_jumping) return;
    _jumping = true;
    img.style.animation = 'none';
    // 1フレーム後にジャンプアニメ開始
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        img.style.animation = 'mcJump 0.7s cubic-bezier(.22,.61,.36,1) forwards';
        img.addEventListener('animationend', ()=>{
          // 着地スカッシュ
          img.style.animation = 'mcLand 0.25s ease forwards';
          img.addEventListener('animationend', ()=>{
            img.style.animation = 'mcIdle 2.8s ease-in-out infinite';
            _jumping = false;
          }, {once:true});
        }, {once:true});
      });
    });
  }

  // ランダムジャンプ（5〜12秒おき）
  function scheduleJump(){
    const delay = 5000 + Math.random() * 7000;
    setTimeout(()=>{
      doJump();
      scheduleJump();
    }, delay);
  }
  scheduleJump();

  // タップでもジャンプ（openMiniroomはbuttonのonclickで処理）
  img.addEventListener('pointerdown', (e)=>{
    e.stopPropagation();
    doJump();
  });
})();

})(); // end initMiniroom
</script>
