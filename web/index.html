<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ことりアルエ - 君とV</title>
<!-- Material Symbols (Google) -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<style>
/* ══════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent!important;tap-highlight-color:transparent!important;outline:none;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#070b18;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP','Meiryo',sans-serif;
  color:#ddeeff;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  tap-highlight-color:transparent;
}
.material-symbols-rounded{
  font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
  vertical-align:middle;
  line-height:1;
}

/* ══════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════ */
/* ══ SPLASH リニューアル ══ */
#splash{
  position:fixed;inset:0;z-index:99999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  overflow:hidden;
  transition:opacity 1.2s ease;
}
#splash.hide{opacity:0;pointer-events:none;}

/* 背景グラデーション */
#splash-bg-grad{
  position:absolute;inset:0;
  background: linear-gradient(160deg,
    #ffd6f0 0%,
    #e8b4f8 18%,
    #c9a8f5 35%,
    #a8c8ff 60%,
    #b8e8ff 80%,
    #d4f0ff 100%
  );
  z-index:0;
}

/* キャラ画像（白背景なので全画面に敷く） */
#splash-chara{
  position:absolute;
  bottom:0;left:0;right:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center bottom;
  z-index:2;
  animation:charaFadeIn 1.0s ease forwards;
  opacity:0;
}
@keyframes charaFadeIn{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* キラキラ星パーティクル */
#splash-particles{
  position:absolute;inset:0;z-index:3;pointer-events:none;
}
/* タップ時キラキラエフェクト */
/* ── 全画面タップキラキラエフェクト（グローバル） ── */
#global-tap-fx{
  position:fixed;inset:0;z-index:999999;pointer-events:none;overflow:hidden;
}
.tap-burst{
  position:absolute;
  pointer-events:none;
  transform:translate(-50%,-50%);
}
.tap-burst .tb-star{
  position:absolute;
  top:50%;left:50%;
  width:0;height:0;
  transform-origin:center center;
  animation:tbFly var(--dur,0.6s) var(--delay,0s) ease-out forwards;
  opacity:0;
}
.tap-burst .tb-star::before{
  content:'';
  display:block;
  width:var(--sz,6px);height:var(--sz,6px);
  background:var(--col,#fff);
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  border-radius:1px;
  box-shadow:0 0 4px var(--col,#fff);
}
@keyframes tbFly{
  0%  {opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(0.2) rotate(0deg);}
  60% {opacity:1; transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));}
  100%{opacity:0; transform:translate(-50%,-50%) translate(calc(var(--tx)*1.3),calc(var(--ty)*1.3)) scale(0.4) rotate(calc(var(--rot)*2));}
}
/* ハート */
.tap-burst .tb-heart{
  position:absolute;
  top:50%;left:50%;
  font-size:var(--sz,11px);
  line-height:1;
  animation:tbFly var(--dur,0.75s) var(--delay,0s) ease-out forwards;
  opacity:0;
  transform:translate(-50%,-50%);
  filter:drop-shadow(0 0 3px var(--col,#ffaacc));
}
/* 旧スプラッシュ専用レイヤー（互換のため残す） */
#splash-tap-fx{ display:none; }
.sp-star{
  position:absolute;
  width:6px;height:6px;
  background:white;
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  animation:starTwinkle var(--dur,2s) ease-in-out var(--delay,0s) infinite;
  opacity:0;
}
@keyframes starTwinkle{
  0%,100%{opacity:0;transform:scale(0.5) rotate(0deg);}
  30%,70%{opacity:1;transform:scale(1) rotate(20deg);}
  50%{opacity:0.8;transform:scale(1.2) rotate(40deg);}
}
/* 大きめの光の玉 */
.sp-orb{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(255,220,255,0.3) 60%,transparent);
  animation:orbFloat var(--dur,3s) ease-in-out var(--delay,0s) infinite;
  opacity:0;
}
@keyframes orbFloat{
  0%,100%{opacity:0;transform:translateY(0) scale(0.8);}
  40%,60%{opacity:0.7;transform:translateY(-12px) scale(1);}
}

/* ロゴ */
#splash-logo-wrap{
  position:absolute;
  bottom:130px;left:0;right:0;
  display:flex;flex-direction:column;
  align-items:center;gap:10px;
  z-index:5;
  animation:logoSlideUp 0.9s 0.5s ease both;
  opacity:0;
}
@keyframes logoSlideUp{
  0%{opacity:0;transform:translateY(30px);}
  100%{opacity:1;transform:translateY(0);}
}
#splash-logo-img{
  width:280px;max-width:75vw;
  filter:drop-shadow(0 4px 20px rgba(180,100,255,0.5)) drop-shadow(0 0 40px rgba(140,180,255,0.4));
}
#splash-subtitle{
  font-size:13px;letter-spacing:2px;
  color:rgba(80,40,120,0.75);
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  text-align:center;line-height:1.7;
  text-shadow:0 1px 4px rgba(255,255,255,0.8);
}

/* 下部ローディングバー */
#splash-loading-bar-wrap{
  position:absolute;bottom:60px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:5;
  animation:fadeInUp 0.8s 1.2s ease both;
  opacity:0;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
#splash-bar-track{
  width:200px;height:3px;
  background:rgba(160,100,200,0.2);
  border-radius:4px;overflow:hidden;
}
#splash-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#e090ff,#90c8ff);
  border-radius:4px;
  box-shadow:0 0 8px rgba(200,150,255,0.6);
  transition:width 0.3s ease;
}
#splash-loading-text{
  font-size:10px;letter-spacing:3px;
  color:rgba(120,80,180,0.6);
  font-family:monospace;
}

/* ヘッダーロゴ */
.topbar-logo{
  height:36px;
  filter:drop-shadow(0 0 10px rgba(200,160,255,.6));
  vertical-align:middle;
  object-fit:contain;
}
.splash-line{
  width:180px;height:1px;margin:18px 0;
  background:linear-gradient(90deg,transparent,rgba(168,216,255,.5),transparent);
}
.boot-log{display:none;}
.boot-line{display:none;}

/* ══════════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════════ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
}

/* ── TOPBAR ── */
#topbar{
  height:42px;
  background:rgba(7,11,24,.75);
  border-bottom:1px solid rgba(168,216,255,.08);
  display:flex;align-items:center;
  padding:0 10px;gap:8px;
  flex-shrink:0;z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
#sit-btn{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;cursor:pointer;
  background:rgba(168,216,255,.06);
  border:1px solid rgba(168,216,255,.15);
  font-size:11px;color:rgba(168,216,255,.6);
  transition:all .25s;
  -webkit-tap-highlight-color:transparent;
}
#sit-btn:hover,#sit-btn.active{
  background:rgba(168,216,255,.14);
  border-color:rgba(168,216,255,.45);
  color:#a8d8ff;
}
.topbar-title{
  flex:1;text-align:center;
  font-size:12px;letter-spacing:3px;
  color:rgba(168,216,255,.65);font-weight:700;
}
#affection-bar-wrap{display:flex;align-items:center;gap:5px;}
.aff-label{font-size:10px;color:rgba(168,216,255,.4);}
#affection-bar{
  width:50px;height:4px;
  background:rgba(255,255,255,.06);
  border-radius:2px;overflow:hidden;
}
#affection-fill{
  height:100%;width:50%;
  background:linear-gradient(90deg,#7b6bff,#ff80c8);
  border-radius:2px;transition:width .8s ease;
}
#aff-num{font-size:10px;color:rgba(168,216,255,.5);min-width:18px;}

/* ══════════════════════════════════════════════════
   CHARACTER AREA
══════════════════════════════════════════════════ */
#character-area{
  flex:1 1 0;
  position:relative;
  overflow:hidden;
  min-height:0;
  /* デフォルト背景 */
  background:#070b18;
}

/* 背景画像レイヤー */
#bg-layer{
  position:absolute;inset:0;
  z-index:0;
  overflow:hidden;
}
/* 静止画背景（video非対応シチュエーション用） */
#bg-img{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  transition:opacity .8s ease;
  width:100%;height:100%;
}
/* 動画背景 */
#bg-video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  opacity:0;
  transition:opacity .8s ease;
  z-index:1;
}
#bg-video.active{ opacity:1; }
#bg-layer::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(7,11,24,.25) 0%,
    rgba(7,11,24,.15) 50%,
    rgba(7,11,24,.7) 100%);
  z-index:2;
  pointer-events:none;
}

/* スキャンライン */
#scanline{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,
    transparent,transparent 3px,
    rgba(168,216,255,.007) 3px,rgba(168,216,255,.007) 4px);
}

/* Live2D ローディング */
#live2d-loading{
  position:absolute;inset:0;z-index:50;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(180deg,#070b18 0%,#0c1224 60%,#070b18 100%);
  transition:opacity .9s ease;
  overflow:hidden;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
#live2d-loading.hidden{opacity:0;pointer-events:none;}

/* ── スコア表示（右上） ── */
#loading-score{
  position:absolute;top:14px;right:16px;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  pointer-events:none;
}
#loading-score-label{
  font-size:8px;letter-spacing:2px;color:rgba(168,216,255,.4);font-family:monospace;
}
#loading-score-val{
  font-size:22px;font-weight:800;letter-spacing:1px;
  color:#a8d8ff;
  text-shadow:0 0 16px rgba(168,216,255,.6);
  font-family:monospace;
  transition:transform .1s;
}
#loading-score-val.pop{animation:scorePop .25s ease;}
@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ── 中央メインキャラ ── */
#loading-main-char{
  width:140px;height:140px;
  position:relative;z-index:2;
  pointer-events:none;
}
#loading-main-char img{
  width:100%;height:100%;object-fit:contain;
  animation:mainBounce 0.55s ease-in-out infinite alternate;
  filter:drop-shadow(0 8px 24px rgba(168,216,255,.35));
}
@keyframes mainBounce{
  0%  {transform:translateY(0)    scaleY(1)    scaleX(1);}
  70% {transform:translateY(-28px) scaleY(1.06) scaleX(0.96);}
  100%{transform:translateY(-32px) scaleY(1.08) scaleX(0.95);}
}
/* 着地スカッシュ */
#loading-main-char img.squish{animation:mainSquish .2s ease;}
@keyframes mainSquish{
  0%  {transform:scaleX(1)   scaleY(1);}
  40% {transform:scaleX(1.4) scaleY(0.55);}
  70% {transform:scaleX(0.92) scaleY(1.1);}
  100%{transform:scaleX(1)   scaleY(1);}
}
/* 影 */
#loading-main-shadow{
  width:80px;height:12px;
  background:radial-gradient(ellipse,rgba(168,216,255,.25) 0%,transparent 70%);
  border-radius:50%;
  margin-top:-4px;
  animation:shadowPulse 0.55s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes shadowPulse{
  0%  {transform:scaleX(1);   opacity:.7;}
  100%{transform:scaleX(0.6); opacity:.3;}
}

/* タップ誘導テキスト */
#loading-tap-hint{
  margin-top:14px;
  font-size:10px;letter-spacing:3px;
  color:rgba(168,216,255,.45);font-family:monospace;
  animation:hintBlink 1.8s ease-in-out infinite;
  pointer-events:none;
}
@keyframes hintBlink{0%,100%{opacity:.8}50%{opacity:.25}}

/* プログレスバー */
.l2d-bar-wrap{width:100px;height:2px;background:rgba(168,216,255,.1);border-radius:1px;margin-top:18px;overflow:hidden;}
.l2d-bar{height:100%;width:0%;background:linear-gradient(90deg,#7b6bff,#a8d8ff);border-radius:1px;transition:width .4s ease;}
.l2d-sub{font-size:9px;letter-spacing:1.5px;color:rgba(168,216,255,.3);font-family:monospace;margin-top:8px;}

/* ── タップで落下する小キャラ ── */
.falling-chibi{
  position:absolute;
  width:40px;height:40px;
  pointer-events:none;
  z-index:3;
  will-change:transform,opacity;
}
.falling-chibi img{width:100%;height:100%;object-fit:contain;}

/* ── 着地して積まれたキャラ ── */
#chibi-pile{
  position:absolute;
  bottom:0;left:0;right:0;
  height:160px;
  pointer-events:none;
  z-index:4;
}
.piled-chibi{
  position:absolute;
  bottom:0;
  width:40px;height:40px;
  pointer-events:none;
}
.piled-chibi img{width:100%;height:100%;object-fit:contain;}

/* 旧互換 */
#chibi-stack-wrap{display:none;}
.chibi-unit{display:none;}
@keyframes chibi-drop{0%{opacity:0;transform:translateY(-80px)}100%{opacity:1;transform:translateY(0)}}
@keyframes chibi-bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}70%{transform:translateY(3px)}}
@keyframes chibi-squish{0%{transform:scaleX(1) scaleY(1)}30%{transform:scaleX(1.3) scaleY(.6)}100%{transform:scaleX(1) scaleY(1)}}

/* Live2D canvas wrap */
#live2d-canvas-wrap{
  position:absolute;inset:0;z-index:2;
  /* タップイベントを遮断しない */
  pointer-events:none;
}
#live2d-canvas-wrap canvas{width:100%!important;height:100%!important;display:block;}

/* タップ波紋 → 削除済み */

/* HUD */
.hud-tag{
  position:absolute;
  display:flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;
  font-size:9px;letter-spacing:1.5px;
  pointer-events:none;z-index:10;
  backdrop-filter:blur(8px);
}
.hud-tag-live2d{top:8px;left:10px;background:rgba(7,11,24,.5);border:1px solid rgba(100,255,160,.2);color:rgba(100,255,160,.7);display:none;}
.hud-tag-ai{top:8px;right:10px;background:rgba(7,11,24,.5);border:1px solid rgba(168,216,255,.2);color:rgba(168,216,255,.7);display:none;}
.hud-dot{width:4px;height:4px;border-radius:50%;}
.hud-dot-green{background:#64ffa0;box-shadow:0 0 6px #64ffa0;}
.hud-dot-cyan{background:#a8d8ff;box-shadow:0 0 6px #a8d8ff;}

/* ネームプレート */
#name-plate{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  padding:5px 22px;
  background:rgba(7,11,24,.5);
  border:1px solid rgba(168,216,255,.18);
  border-radius:20px;
  text-align:center;pointer-events:none;z-index:10;
  backdrop-filter:blur(12px);
}
.name-main{font-size:12px;letter-spacing:5px;color:rgba(168,216,255,.9);font-weight:600;}
.name-sub{font-size:8px;letter-spacing:2px;color:rgba(168,216,255,.45);margin-top:1px;}

/* ──── スタンプパネル ──── */
#stamp-panel{
  display:none;
  position:absolute;bottom:0;left:0;right:0;z-index:300;
  background:rgba(7,11,24,.92);
  border-top:1px solid rgba(168,216,255,.15);
  padding:10px 12px 16px;
  backdrop-filter:blur(20px);
}
#stamp-panel.open{display:block;}
.stamp-header{
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
}
.stamp-title{font-size:10px;letter-spacing:2px;color:rgba(168,216,255,.6);}
.stamp-close{
  margin-left:auto;cursor:pointer;
  color:rgba(168,216,255,.4);font-size:16px;
  -webkit-tap-highlight-color:transparent;
}
.stamp-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.stamp-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px;border-radius:10px;
  border:1px solid rgba(168,216,255,.08);
  background:rgba(168,216,255,.03);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.stamp-item:hover,.stamp-item:active{
  background:rgba(168,216,255,.12);border-color:rgba(168,216,255,.4);
}
.stamp-item img{width:72px;height:72px;object-fit:contain;}
.stamp-item-label{font-size:9px;color:rgba(168,216,255,.5);letter-spacing:1px;}

/* スタンプ送信アニメーション */
.stamp-sent-overlay{
  position:fixed;inset:0;z-index:500;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.stamp-anim-img{
  width:220px;height:220px;object-fit:contain;
  animation:stamp-pop .7s ease-out forwards;
}
@keyframes stamp-pop{
  0%{transform:scale(0.2) rotate(-15deg);opacity:0;}
  60%{transform:scale(1.15) rotate(5deg);opacity:1;}
  80%{transform:scale(0.95) rotate(-2deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.stamp-fade-out{animation:stamp-fadeout .5s ease-in forwards!important;}
@keyframes stamp-fadeout{
  0%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.3) translateY(-30px);}
}

/* スタンプボタン（入力エリア） */
#stamp-btn{
  width:38px;height:38px;flex-shrink:0;
  background:rgba(168,216,255,.06);
  border:1px solid rgba(168,216,255,.2);
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:rgba(168,216,255,.6);
  -webkit-tap-highlight-color:transparent;
}
#stamp-btn:hover{background:rgba(168,216,255,.16);color:#a8d8ff;}
#stamp-btn .material-symbols-rounded{font-size:20px;}

/* 音声ボタン */
#voice-btn{
  position:absolute;top:8px;right:10px;z-index:15;
  width:28px;height:28px;
  background:rgba(7,11,24,.55);
  border:1px solid rgba(168,216,255,.2);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(168,216,255,.6);
  backdrop-filter:blur(8px);
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
#voice-btn:hover{background:rgba(168,216,255,.14);color:#a8d8ff;}
#voice-btn .material-symbols-rounded{font-size:16px;}
#voice-btn.speaking{
  border-color:rgba(168,216,255,.6);
  box-shadow:0 0 12px rgba(168,216,255,.3);
  animation:voice-pulse 1.2s ease-in-out infinite;
}
@keyframes voice-pulse{
  0%,100%{box-shadow:0 0 8px rgba(168,216,255,.2);}
  50%{box-shadow:0 0 20px rgba(168,216,255,.5);}
}

/* バストアップ固定 - スクロールインジケータ非表示 */
#bust-indicator{
  position:absolute;bottom:55px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:1.5px;color:rgba(168,216,255,.3);
  pointer-events:none;z-index:10;
}


/* ══════════════════════════════════════════════════
   CHAT AREA
══════════════════════════════════════════════════ */
#chat-area{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;flex-direction:column;
  background:rgba(5,8,20,.97);

/* ══════════════════════════════

══════════════════════════════ */
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

/* UIクリック音（短い「チッ」） */
function playSE_click(){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(1200,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(800,ctx.currentTime+0.06);
    g.gain.setValueAtTime(0.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.1);
  }catch(e){}
}

/* メッセージ送信音（少し高め） */
function playSE_send(){
  try{
    const ctx=getAudioCtx();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.setValueAtTime(900,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1400,ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.15);
  }catch(e){}
}

/* 応答受信音（柔らかいチャイム） */
function playSE_receive(){
  try{
    const ctx=getAudioCtx();
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      const t=ctx.currentTime+i*0.1;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.1,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.4);
    });
  }catch(e){}
}

/* BGM（ループするアンビエント） */
const BGM_FILES = {
  daily:     'audio/bgm/daily.mp3',

function startBGM(situId){
  try{
    if(bgmAudio){ bgmAudio.pause(); bgmAudio=null; }
    const file = BGM_FILES[situId] || BGM_FILES['daily'];
    bgmAudio = new Audio(file);
    bgmAudio.loop = true;
    bgmAudio.volume = window._bgmVol || 0.35;
    bgmAudio.play().catch(e=>console.warn('BGM play error:',e));
    bgmPlaying=true;
    document.getElementById('bgm-icon').textContent='music_off';
  }catch(e){ console.warn('BGM error:',e); }
}

function stopBGM(){
  try{
    if(bgmAudio){ bgmAudio.pause(); bgmAudio=null; }
    bgmPlaying=false;
    document.getElementById('bgm-icon').textContent='music_note';
  }catch(e){}
}

function toggleBGM(){
  playSE_click();
  if(bgmPlaying) stopBGM(); else startBGM(situation?situation.id:'daily');

function toggleVoice(){

  playSE_click();
}

async function speakText(text){
  if(!voiceEnabled) return;
  try{
    // 現在再生中の音声を停止
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    const vBtn=document.getElementById('voice-btn');
    vBtn.classList.add('speaking');

    const resp=await fetch('/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text, voice:'ja-JP-NanamiNeural'}),
    });
    if(!resp.ok) throw new Error('TTS failed');

    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    currentAudio=audio;

    // 口パク開始
    _startLipSync(audio);

    // 再生完了をPromiseで返す（話し切ってから次の処理ができる）
    await new Promise((resolve)=>{
      audio.onended=()=>{
        vBtn.classList.remove('speaking');
        URL.revokeObjectURL(url);
        currentAudio=null;
        _stopLipSync();
        resolve();
      };
      audio.onerror=()=>{
        vBtn.classList.remove('speaking');
        currentAudio=null;
        _stopLipSync();
        resolve(); // エラーでもresolveして次へ進む
      };
      audio.play().catch(e=>{
        console.warn('audio play error:',e);
        vBtn.classList.remove('speaking');
        _stopLipSync();
        resolve();
      });
    });
  }catch(e){
    console.warn('TTS error:',e);
    document.getElementById('voice-btn').classList.remove('speaking');
    _stopLipSync();
  }
}

/* ══════════════════════════════
   口パク（リップシンク）
══════════════════════════════ */
let _lipSyncTimer = null;
let _lipSyncAudioCtx = null;
let _lipSyncAnalyser = null;
let _lipSyncSource = null;
let _lipSyncAudioEl = null; // 現在接続中のAudioElement

function _setMouth(val){
  const v = Math.max(0, Math.min(1, val));
  if(live2dModel){
    try{ live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', v); }catch(e){}
  }
  if(window._fallbackSetMouth) window._fallbackSetMouth(v);
}

function _startLipSync(audioEl){
  _stopLipSync();

  const useSameEl = (_lipSyncAudioEl === audioEl);
  _lipSyncAudioEl = audioEl;

  try{
    if(!_lipSyncAudioCtx){
      _lipSyncAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    }
    if(_lipSyncAudioCtx.state==='suspended') _lipSyncAudioCtx.resume();

    _lipSyncAnalyser = _lipSyncAudioCtx.createAnalyser();
    _lipSyncAnalyser.fftSize = 256;
    _lipSyncAnalyser.smoothingTimeConstant = 0.5; // 適度なスムージングで滑らかな開閉に

    if(!useSameEl){
      if(_lipSyncSource){ try{ _lipSyncSource.disconnect(); }catch(e){} _lipSyncSource=null; }
      _lipSyncSource = _lipSyncAudioCtx.createMediaElementSource(audioEl);
    }
    _lipSyncSource.connect(_lipSyncAnalyser);
    _lipSyncAnalyser.connect(_lipSyncAudioCtx.destination);

    const dataArray = new Uint8Array(_lipSyncAnalyser.frequencyBinCount);
    let _mouthCur   = 0;   // 現在の口開き値
    let _silenceCount = 0; // 無音フレーム数
    let _phase = 0;        // 開閉サイクル用位相（ラジアン）
    // 日本語TTS: 音節ごとに口が開閉するテンポに合わせた速度
    const CYCLE_SPEED = 0.27; // 1フレーム(16ms)あたりの位相進み → 約0.27/(2π)*60fps ≈ 2.6Hz（半分のテンポ）

    _lipSyncTimer = setInterval(()=>{
      if(audioEl.ended || audioEl.paused){ _stopLipSync(); return; }

      _lipSyncAnalyser.getByteFrequencyData(dataArray);

      // 母音帯域（200〜2000Hz）の音量を取得
      // fftSize=256 → binCount=128, bin幅≈172Hz → index1〜12≈172〜2064Hz
      let sum = 0, peak = 0;
      for(let i=1; i<13; i++){
        const v = dataArray[i];
        sum += v;
        if(v > peak) peak = v;
      }
      const avg = sum / (12 * 255);
      const pkN = peak / 255;

      // 現在の音量（0〜1）
      const volume = Math.min(1, pkN * 3.0 + avg * 1.0);

      if(volume > 0.05){
        // ─ 音がある: sinサイクルで強制開閉 ─
        _silenceCount = 0;
        _phase += CYCLE_SPEED;

        // |sin(phase)| → 0〜1の自然な開閉カーブ
        const cycle = Math.abs(Math.sin(_phase));

        // 底上げ: 0.2〜1.0の範囲で開閉（完全に閉じず、自然な話し方に）
        const targetOpen = (0.2 + 0.8 * cycle) * Math.min(1, volume * 2.0);

        // ゆっくり追従（半分のスピードで滑らかに）
        _mouthCur += (targetOpen - _mouthCur) * 0.35;

      } else {
        // ─ 無音: すばやく閉じる ─
        _silenceCount++;
        _phase = 0; // 次の発話でサイクルをリセット
        if(_silenceCount >= 2){
          _mouthCur = 0;
        } else {
          _mouthCur *= 0.2;
        }
      }

      // 閾値以下は完全クローズ
      const out = _mouthCur < 0.06 ? 0 : _mouthCur;
      _setMouth(out);
    }, 32); // 32ms≈30fps（半分の更新レートで動きをゆっくりに）

  }catch(e){
    console.warn('LipSync WebAudio error:', e);
    _startSimpleLipSync(audioEl);
  }
}

function _startSimpleLipSync(audioEl){
  // WebAudio非対応時のフォールバック: 話し言葉の開閉（短い開閉を繰り返す）
  // 日本語音節のリズム: 開→閉→開→閉 を素早く
  const pattern = [0.85,0.0,0.75,0.0,0.9,0.0,0.0,0.6,0.0,0.8,0.0,0.0,0.7,0.0,0.5,0.0];
  let idx = 0;
  _lipSyncTimer = setInterval(()=>{
    if(!audioEl || audioEl.ended || audioEl.paused){ _stopLipSync(); return; }
    _setMouth(pattern[idx % pattern.length]);
    idx++;
  }, 55); // 55ms間隔（約18fps）でパキパキ開閉
}

function _stopLipSync(){
  if(_lipSyncTimer){ clearInterval(_lipSyncTimer); _lipSyncTimer=null; }
  try{ if(_lipSyncAnalyser){ _lipSyncAnalyser.disconnect(); _lipSyncAnalyser=null; } }catch(e){}
  // 口を完全に閉じる（即座＋念押し4回）
  _setMouth(0);
  setTimeout(()=>{ _setMouth(0); }, 16);
  setTimeout(()=>{ _setMouth(0); }, 50);
  setTimeout(()=>{ _setMouth(0); }, 120);
  setTimeout(()=>{ _setMouth(0); }, 250);
}

  // 送信ユーザーバブル（画像）をチャットスクロールエリアに追加

  showStampOverlay(stamp.img);

  chatHistory.push({role:'user', content:`[スタンプ: ${stamp.label}] ユーザーが「${stamp.label}」のスタンプを送ってきた`});

  // ローディング表示
  setLoading(true);

  // AI呼び出し（スタンプ専用プロンプト）
  callAIForStamp(stamp).then(response=>{
    const res_text = response.text || stamp.text;
    const res_emotion = response.emotion || stamp.emotion;
    updateAffection(response.affection_delta||0);
    chatHistory.push({role:'assistant', content:res_text});
    showCharMessage(res_text, res_emotion);
    speakText(res_text);
    playSE_receive();

    // フォールバック: 固定テキスト
    showCharMessage(stamp.text, stamp.emotion);
    speakText(stamp.text);
    playSE_receive();
  }).finally(()=>{
    setLoading(false);
  });
}

(function initSplash(){
  // ── キラキラパーティクルを生成 ──
  const particles = document.getElementById('splash-particles');
  if(particles){
    // 小さい星を20個
    for(let i=0;i<20;i++){

        --dur:${1.5+Math.random()*2.5}s;
        --delay:${Math.random()*2}s;
      `;
      particles.appendChild(star);
    }
    // 光の玉を8個
    for(let i=0;i<8;i++){
      const orb = document.createElement('div');
      orb.className = 'sp-orb';
      const size = 10 + Math.random()*20;
      orb.style.cssText = `
        left:${Math.random()*90}%;
        top:${Math.random()*80}%;
        width:${size}px;height:${size}px;
        --dur:${2+Math.random()*3}s;
        --delay:${Math.random()*2.5}s;
      `;
      particles.appendChild(orb);
    }
  }

  // ── ローディングバーアニメ ──
  const bar = document.getElementById('splash-bar-fill');
  const barText = document.getElementById('splash-loading-text');
  const steps = [
    {w:20, t:'loading...'},
    {w:45, t:'connecting...'},
    {w:70, t:'preparing...'},
    {w:90, t:'almost ready...'},
    {w:100,t:'process...OK'},
  ];
  steps.forEach((s,i)=>{
    setTimeout(()=>{
      if(bar) bar.style.width = s.w+'%';
      if(barText) barText.textContent = s.t;
    }, 300 + i*380);
  });

  // スプラッシュのバーストはグローバル関数を使用（後ほど初期化）
  // ※ グローバルタップ処理は initGlobalTapFx() で一括管理

  // ── 起動音を再生し、再生完了後にスプラッシュを非表示 ──
  function hideSplashScreen(){
    const s = document.getElementById('splash');
    if(s){ s.classList.add('hide'); setTimeout(()=>{ s.style.display='none'; }, 1200); }
  }

  const startupAudio = new Audio('audio/startup.mp3');
  startupAudio.volume = 1.0;

  // 再生完了 → 次の画面へ
  startupAudio.addEventListener('ended', ()=>{
    hideSplashScreen();
  }, {once: true});

  // エラー時（音声読み込み失敗など）はフォールバックで2.4秒後に遷移
  startupAudio.addEventListener('error', ()=>{
    console.warn('起動音の読み込みに失敗しました。フォールバック遷移します。');
    setTimeout(hideSplashScreen, 2400);
  }, {once: true});

  // 再生開始（ブラウザの自動再生ポリシー対応）
  const playPromise = startupAudio.play();
  if(playPromise !== undefined){
    playPromise.catch(()=>{
      // 自動再生がブロックされた場合：最初のタップで再生開始
      function tryPlay(){
        startupAudio.play().then(()=>{
          document.removeEventListener('pointerdown', tryPlay, {capture:true});
          document.removeEventListener('touchstart', tryPlay, {capture:true});
        }).catch(()=>{});
      }
      document.addEventListener('pointerdown', tryPlay, {capture:true, once:true});
      document.addEventListener('touchstart', tryPlay, {capture:true, once:true});
      // 自動再生ブロック時は5秒後にフォールバック遷移
      setTimeout(()=>{
        if(document.getElementById('splash') && !document.getElementById('splash').classList.contains('hide')){
          hideSplashScreen();
        }
      }, 5000);
    });
  }

  // 保険: 30秒後にローディングオーバーレイ強制非表示（チャットUIはhideLoadingOverlay内で制御）
  setTimeout(()=>{ if(!_overlayHidden) hideLoadingOverlay(); }, 30000);
})();

(function initLoadingScreen(){
  // 落下キャラ画像リスト（5種類からランダム）
  const CHIBI_IMGS = [
    'img/loading_chars/char1.png',
    'img/loading_chars/char2.png',
    'img/loading_chars/char3.png',
    'img/loading_chars/char4.png',
    'img/loading_chars/char5.png',
  ];
  function randomChibiSrc(){ return CHIBI_IMGS[Math.floor(Math.random()*CHIBI_IMGS.length)]; }

  const pile   = document.getElementById('chibi-pile');
  const scoreEl = document.getElementById('loading-score-val');
  const overlay = document.getElementById('live2d-loading');
  if(!pile || !overlay) return;

  let score = parseInt(localStorage.getItem('loadingScore')||'0');
  let tapCount = 0;
  // 積み上げ座標管理: X列ごとの高さ
  const colH = {}; // key: colIndex, value: current height px

  function updateScore(v){
    score += v;
    localStorage.setItem('loadingScore', score);
    if(scoreEl){
      scoreEl.textContent = score;
      scoreEl.classList.remove('pop');
      void scoreEl.offsetWidth; // reflow
      scoreEl.classList.add('pop');
    }
  }
  // 初期スコア反映
  if(scoreEl) scoreEl.textContent = score;

  function spawnFallingChibi(startX){
    const el = document.createElement('div');
    el.className = 'falling-chibi';
    const img = document.createElement('img');
    const chosenSrc = randomChibiSrc(); // この落下キャラの画像を固定
    img.src = chosenSrc;
    el.appendChild(img);
    const w = window.innerWidth || 390;
    const h = window.innerHeight || 844;
    const size = 32 + Math.random() * 24;       // 32〜56px
    const rot  = (Math.random() - 0.5) * 60;    // -30〜+30度
    const flip = Math.random() < 0.5 ? -1 : 1;  // 左右反転
    const xPos = startX !== undefined
      ? Math.max(0, Math.min(w - size, startX - size/2))
      : Math.random() * (w - size);
    const spinDeg = (Math.random() - 0.5) * 720; // 着地までの回転量
    const fallDur = 0.55 + Math.random() * 0.35; // 0.55〜0.9秒

    el.style.cssText = `
      left:${xPos}px; top:-${size+10}px;
      width:${size}px; height:${size}px;
      transform:rotate(${rot}deg) scaleX(${flip});
    `;
    overlay.appendChild(el);

    // アニメーション: 落下
    const startTop = -(size + 10);
    const colKey = Math.round(xPos / 40); // 40px幅のカラム
    const pileH = colH[colKey] || 0;
    const landTop = h - size - pileH;
    const dist = landTop - startTop;

    let startTime = null;
    function fall(ts){
      if(!startTime) startTime = ts;
      const prog = Math.min(1, (ts - startTime) / (fallDur * 1000));
      // イージング: ease-in
      const ease = prog * prog;
      const curRot = rot + spinDeg * ease;
      const curY = startTop + dist * ease;
      el.style.transform = `translateY(${curY}px) rotate(${curRot}deg) scaleX(${flip})`;
      el.style.opacity   = Math.min(1, prog * 3).toString();

      if(prog < 1){
        requestAnimationFrame(fall);
      } else {
        // 着地 → 積み上げに変換（同じ画像を引き継ぐ）
        el.remove();
        landChibi(xPos, size, rot, flip, pileH, chosenSrc);
        colH[colKey] = pileH + size * 0.6; // 次のキャラが積まれる高さ
      }
    }
    requestAnimationFrame(fall);
  }

  function landChibi(xPos, size, rot, flip, pileH, src){
    const h = window.innerHeight || 844;
    const el = document.createElement('div');
    el.className = 'piled-chibi';
    const img = document.createElement('img');
    img.src = src || randomChibiSrc(); // 落下時の画像を引き継ぐ
    el.appendChild(img);

    // 少しランダムな傾きで着地（ごちゃっと積まれた感）
    const finalRot = (Math.random() - 0.5) * 25;
    el.style.cssText = `
      left:${xPos}px;
      bottom:${pileH}px;
      width:${size}px; height:${size}px;
      transform:rotate(${finalRot}deg) scaleX(${flip});
      transform-origin: bottom center;
    `;

    // スカッシュアニメ
    img.style.animation = 'none';
    el.style.transition = 'transform .15s ease';
    pile.appendChild(el);

    // 着地スカッシュ
    requestAnimationFrame(()=>{
      el.style.transform = `rotate(${finalRot}deg) scaleX(${flip * 1.3}) scaleY(0.6)`;
      setTimeout(()=>{
        el.style.transform = `rotate(${finalRot}deg) scaleX(${flip * 0.95}) scaleY(1.05)`;
        setTimeout(()=>{
          el.style.transform = `rotate(${finalRot}deg) scaleX(${flip}) scaleY(1)`;
        }, 80);
      }, 100);
    });

    // 周辺のpiled-chibiも少し揺らす
    const siblings = pile.querySelectorAll('.piled-chibi');
    siblings.forEach((s, i)=>{
      if(s !== el && i >= siblings.length - 5){
        s.style.transition = 'transform .12s ease';
        const cr = parseFloat(s.style.transform.match(/rotate\(([-\d.]+)deg\)/)?.[1]||'0');
        const jitter = (Math.random()-0.5)*8;
        s.style.transform = s.style.transform.replace(/rotate\([^)]+\)/,`rotate(${cr+jitter}deg)`);
        setTimeout(()=>{
          s.style.transform = s.style.transform.replace(/rotate\([^)]+\)/,`rotate(${cr}deg)`);
        }, 200);
      }
    });

    updateScore(10);
    tapCount++;
  }

  // タップ/クリック: 指の位置からランダムに落下
  overlay.addEventListener('pointerdown', (e)=>{
    if(e.target && e.target.closest('#l2d-bar, #l2d-bar-wrap, .l2d-sub')) return;
    const x = e.clientX;
    // タップSE（ポップ音）
    try{
      const ctx = window.audioCtx || (window.audioCtx = new (window.AudioContext||window.webkitAudioContext)());
      if(ctx.state==='suspended') ctx.resume();
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine';
      o.frequency.setValueAtTime(1000,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1500,ctx.currentTime+0.04);
      g.gain.setValueAtTime(0.22,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      o.start(ctx.currentTime); o.stop(ctx.currentTime+0.12);
    }catch(ex){}
    // 1タップで1〜2体
    spawnFallingChibi(x + (Math.random()-0.5)*60);
    if(Math.random() < 0.4) spawnFallingChibi(x + (Math.random()-0.5)*80);
  });

  // 停止関数
  window._stopChibiStack = ()=>{ /* ローディング終了時は何もしない */ };
})();

async function initLive2D(){
  const wrap=document.getElementById('live2d-canvas-wrap');
  const charArea=document.getElementById('character-area');
  const W=charArea.clientWidth||window.innerWidth;
  const H=charArea.clientHeight||window.innerHeight*0.7;

  setLoadingProgress(10,'INITIALIZING RENDERER...');

  pixiApp=new PIXI.Application({
    width:W,height:H,
    backgroundAlpha:0,
    antialias:true,
    autoDensity:true,
    resolution:window.devicePixelRatio||1,
  });
  wrap.appendChild(pixiApp.view);
  setLoadingProgress(25,'RENDERER READY');

  new ResizeObserver(()=>{
    const nw=charArea.clientWidth,nh=charArea.clientHeight;
    if(nw>0&&nh>0){
      pixiApp.renderer.resize(nw,nh);
      if(live2dModel) placeModel(nw,nh);
    }
  }).observe(charArea);

  try{
    if(!window.PIXI||!PIXI.live2d) throw new Error('pixi-live2d-display not loaded');
    setLoadingProgress(40,'LOADING MODEL DATA...');

    const mp=PIXI.live2d.Live2DModel.from(MODEL_PATH,{onError:(e)=>console.error(e)});
    let prog=40;
    const iv=setInterval(()=>{
      if(prog<84){prog+=2;setLoadingProgress(prog,prog<62?'LOADING TEXTURE (40MB)...':'PROCESSING MODEL...');}
    },350);

    live2dModel=await mp;
    clearInterval(iv);
    setLoadingProgress(94,'PLACING MODEL...');
    pixiApp.stage.addChild(live2dModel);
    placeModel(W,H);
    setLoadingProgress(100,'COMPLETE!');
    document.getElementById('ai-status').textContent='LIVE2D ✓';
    setTimeout(()=>hideLoadingOverlay(),600);

  }catch(err){
    console.warn('Live2D failed:',err.message);
    setLoadingProgress(100,'FALLBACK MODE');
    setTimeout(()=>hideLoadingOverlay(),500);
    startFallback(W,H);
  }
}

function placeModel(W,H){
  if(!live2dModel) return;
  const mw=live2dModel.internalModel.originalWidth||512;
  const mh=live2dModel.internalModel.originalHeight||512;

  // ── バストアップ固定 ──
  // anchor(0.5, 0.28): モデルの胸部付近をピボットに
  // scale*2.0: 上半身が画面の大部分を占める大きさ
  // X: 常に中央（タップ・ドラッグでずれない）
  // Y: anchor=0.28なのでモデルの頭頂が画面上方に来る
  live2dModel.anchor.set(0.5, 0.28);
  const baseScale = Math.min(W / mw, H / mh) * 2.0 * modelScale;
  live2dModel.scale.set(baseScale);
  live2dModel.x = W / 2;
  // Y: 画面の高さの40%付近に配置 → 頭が切れず胸〜腰が見える
  live2dModel.y = H * 0.52 + modelOffsetY;
}

/* ══════════════════════════════
   Fallback
══════════════════════════════ */
function startFallback(W,H){
  const g=new PIXI.Graphics(); pixiApp.stage.addChild(g);
  let t=0,cur={eye:1,mouth:.1,blush:0},tgt={eye:1,mouth:.1,blush:0};
  const FM={neutral:{eye:1,mouth:.1,blush:0},happy:{eye:.8,mouth:.7,blush:.5},love:{eye:.65,mouth:.6,blush:1},shy:{eye:.85,mouth:.3,blush:.9},sad:{eye:1.1,mouth:.15,blush:0},surprised:{eye:1.4,mouth:.8,blush:.3},angry:{eye:.75,mouth:.45,blush:.35}};
  window._fallbackSetExpr=k=>{tgt={...(FM[k]||FM.neutral)};};
  window._fallbackSetMouth=v=>{tgt.mouth=Math.max(0.05,Math.min(1,v));};
  pixiApp.ticker.add(()=>{
    t+=.016;
    ['eye','mouth','blush'].forEach(k=>{cur[k]+=(tgt[k]-cur[k])*.1;});
    const cw=pixiApp.renderer.width,ch=pixiApp.renderer.height;
    const cx=cw/2,cy=ch*.55+modelOffsetY,R=Math.min(cw,ch)*.28;
    const bY=Math.sin(t*1.2)*3,blT=t%4,eyeH=blT<3.75?cur.eye:Math.max(.05,1-(blT-3.75)*20);
    g.clear();
    g.beginFill(0x2a0a4a);g.drawEllipse(cx,cy+bY,R*1.15,R*1.35);g.endFill();
    g.beginFill(0xFFD8C0);g.drawEllipse(cx,cy+bY,R,R*1.05);g.endFill();
    if(cur.blush>.1){g.beginFill(0xFF9999,cur.blush*.35);g.drawEllipse(cx-R*.42,cy+bY+R*.15,R*.2,R*.1);g.drawEllipse(cx+R*.42,cy+bY+R*.15,R*.2,R*.1);g.endFill();}
    g.beginFill(0x1a0a3a);g.drawEllipse(cx-R*.3,cy+bY-R*.1,R*.16,R*.12*eyeH);g.endFill();
    g.beginFill(0xFFFFFF,.5);g.drawEllipse(cx-R*.25,cy+bY-R*.14,R*.04,R*.04);g.endFill();
    g.beginFill(0x1a0a3a);g.drawEllipse(cx+R*.3,cy+bY-R*.1,R*.16,R*.12*eyeH);g.endFill();
    g.beginFill(0xFFFFFF,.5);g.drawEllipse(cx+R*.25,cy+bY-R*.14,R*.04,R*.04);g.endFill();
    g.beginFill(0xFF6688);g.drawEllipse(cx,cy+bY+R*.3,R*.2,Math.max(R*.02,R*.075*cur.mouth));g.endFill();
    g.beginFill(0x4a1a7a);
    g.moveTo(cx-R*.75,cy+bY-R*.85);
    g.bezierCurveTo(cx-R*.5,cy+bY-R*1.35,cx+R*.5,cy+bY-R*1.35,cx+R*.75,cy+bY-R*.85);
    g.lineTo(cx+R*.42,cy+bY-R*.2);
    g.bezierCurveTo(cx+R*.2,cy+bY-R*.65,cx-R*.2,cy+bY-R*.65,cx-R*.42,cy+bY-R*.2);
    g.closePath();g.endFill();
  });
}

/* ══════════════════════════════
   タップ・スワイプ操作
══════════════════════════════ */
(function setupTapControls(){

  const overlay=document.getElementById('tap-overlay');

  let lastDist=0;
  let dragStartY=null,dragStartOffset=0;
  let tapStartX=0,tapStartY=0,tapStartTime=0;
  let isDragging=false;

  // ── タッチ ──
  overlay.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      lastDist=getTouchDist(e.touches);
      dragStartY=null; // ピンチ中はドラッグキャンセル
      isDragging=false;
    } else if(e.touches.length===1){
      tapStartX=e.touches[0].clientX;
      tapStartY=e.touches[0].clientY;
      tapStartTime=Date.now();
      dragStartY=e.touches[0].clientY;
      dragStartOffset=modelOffsetY; // ドラッグ開始時のoffsetを記録
      isDragging=false;
    }
  },{passive:true});

  overlay.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=getTouchDist(e.touches);
      if(lastDist>0){
        const ratio=d/lastDist;
        modelScale=Math.min(Math.max(modelScale*ratio,0.3),3.0);
        refreshModel();
      }
      lastDist=d;
      isDragging=true;
    } else if(e.touches.length===1 && dragStartY!==null){
      const dy=e.touches[0].clientY-dragStartY;
      if(Math.abs(dy)>8) isDragging=true; // 8px以上で初めてドラッグと判定
      if(isDragging){
        // dragStartOffsetからの相対移動のみ適用（毎フレームdragStartYから計算）
        modelOffsetY=Math.min(Math.max(dragStartOffset+dy,-300),300);
        refreshModel();
      }
    }
  },{passive:true});

  overlay.addEventListener('touchend',e=>{
    if(e.changedTouches.length>0){
      const elapsed=Date.now()-tapStartTime;
      const dx=e.changedTouches[0].clientX-tapStartX;
      const dy=e.changedTouches[0].clientY-tapStartY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      // タップ判定：移動量10px以内 && 300ms以内 && ドラッグ未実行
      if(!isDragging && dist<10 && elapsed<300){
        const rect=overlay.getBoundingClientRect();
        playSE_click();
      }
    }
    lastDist=0; dragStartY=null; isDragging=false;
  },{passive:true});

  // ── マウス ──
  let mouseDown=false;
  overlay.addEventListener('mousedown',e=>{
    tapStartX=e.clientX; tapStartY=e.clientY;
    tapStartTime=Date.now();
    dragStartY=e.clientY; dragStartOffset=modelOffsetY;
    isDragging=false;
    mouseDown=true;
    document.body.classList.add('dragging-model');
  });
  document.addEventListener('mousemove',e=>{
    if(!mouseDown) return;
    const dy=e.clientY-dragStartY;
    if(Math.abs(dy)>5) isDragging=true;
    if(isDragging){
      modelOffsetY=Math.min(Math.max(dragStartOffset+dy,-300),300);
      refreshModel();
    }
  });
  document.addEventListener('mouseup',e=>{
    if(mouseDown){
      const elapsed=Date.now()-tapStartTime;
      const dx=e.clientX-tapStartX,dy=e.clientY-tapStartY;
      if(!isDragging && Math.sqrt(dx*dx+dy*dy)<10 && elapsed<200){
        const rect=overlay.getBoundingClientRect();
        playSE_click();
      }
    }
    dragStartY=null;isDragging=false;mouseDown=false;
    document.body.classList.remove('dragging-model');
  });

  // ホイールズーム
  overlay.addEventListener('wheel',e=>{
    e.preventDefault();
    modelScale=Math.min(Math.max(modelScale-(e.deltaY>0?0.05:-0.05),0.3),3.0);
    refreshModel();
  },{passive:false});
})();

function getTouchDist(touches){
  const dx=touches[0].clientX-touches[1].clientX;
  const dy=touches[0].clientY-touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

    // エラーが起きても必ずフォールバック表示
    const fb=generateOfflineResponse(text);
    const fbObj=Array.isArray(fb)?fb[0]:fb;
    showCharMessage(fbObj.text||'ごめんね、うまく聞こえなかったかも？',fbObj.emotion||'neutral');
  }finally{
    // 必ずloading解除
    setLoading(false);
  }
}

// スタンプ連投時の「前回の返答」を記録
let _lastStampReply = '';
let _stampCount = {}; // スタンプIDごとの連投カウント

async function callAIForStamp(stamp){
  const affLv = affection>=85?'最高（積極的に甘える）':affection>=70?'高（甘え表現あり）':affection>=40?'普通（フレンドリー）':'低（少し控えめ）';
  const situation = currentSit ? currentSit.name : '日常';

  // 連投カウント更新
  _stampCount[stamp.id] = (_stampCount[stamp.id]||0) + 1;
  const count = _stampCount[stamp.id];
  const countNote = count >= 2
    ? `同じスタンプを${count}回連続で送ってきた。前回と完全に違う反応・表現・言い回しをすること。`
    : '';

  // 直前の返答を参照して同じにならないよう指示
  const prevNote = _lastStampReply
    ? `前回の返答「${_lastStampReply.slice(0,20)}…」と同じ内容は絶対NG。全く異なる表現を使うこと。`
    : '';

  // ランダム性を高めるためのシード要素
  const seed = `${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
  // 直近の会話履歴も渡してコンテキストを持たせる
  const recentHistory = chatHistory.slice(-4);

  const systemPrompt = `あなたはVtuberの来鳥アルエ（ことりあるえ）です。ユーザーが「${stamp.label}」スタンプを送ってきました。
シチュエーション: ${situation} / 好感度: ${affLv}
${countNote}
${prevNote}

【絶対ルール】
- 1〜2文で短く、毎回まったく違う言葉・表現を使う
- 同じフレーズや言い回しを繰り返さない
- スタンプの感情「${stamp.emotion}」に合った自然な反応
- かわいく感情豊かに、でもワンパターンにならないよう創造的に
- seed: ${seed}

JSON形式のみで返答:
{"text":"返答文","emotion":"${stamp.emotion}","affection_delta":数値(-2〜5)}`;

  const messages = [
    { role:'system', content: systemPrompt },
    ...recentHistory,
    { role:'user', content:`[スタンプ: ${stamp.label}]` }
  ];

  const body = JSON.stringify({
    model: 'gpt-4o',
    messages,
    max_tokens: 120,
    temperature: 1.1,  // より多様な出力
    presence_penalty: 0.8,  // 繰り返しペナルティ
    frequency_penalty: 0.8, // 頻出表現を抑制
  });

  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body
  });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const raw = data.choices[0].message.content.trim();
  const m = raw.match(/\{[\s\S]*?\}/);
  if(!m) throw new Error('JSON not found');
  const result = JSON.parse(m[0]);
  // 返答を記録
  _lastStampReply = result.text || '';
  return result;
}

  ).join('\n');
  const systemPrompt=`あなたはVtuberの「来鳥アルエ（ことりあるえ）」です。以下のキャラクター設定を完全に守り、自然でリアルな会話をしてください。

【キャラクター詳細】

【厳守ルール】

2. 相手の発言の具体的なワードに反応する
3. 自然な会話の流れで必ず質問や話題を続ける
4. シチュエーションに合った言葉遣いにする

【好感度別トーン】

- 40-69：明るくフレンドリー、笑顔の絵文字あり

【直近の会話履歴（参考）】
${recentHistory||'（まだ会話なし）'}

【返答形式 - 重要】
必ずJSONのみ（前後に余計な文字・マークダウン禁止）。
約30%の確率で返答を2つに分割して送る（LINEのように「おはよ！」「今何してたの？あそぼーよ」と自然に分ける）。
- 1つで返す場合: {"text":"セリフ","emotion":"happy|love|shy|sad|surprised|angry|neutral","affection_delta":数値}
- 2つに分ける場合: {"text":"1つ目のセリフ","text2":"2つ目のセリフ","emotion":"感情","affection_delta":数値}
text2がある場合は必ずtext2も含めること。text2は短め（1文）で自然な続き。`;

  const resp=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'gpt-4o',
      messages:[{role:'system',content:systemPrompt},...chatHistory.slice(-8)],
      max_tokens:500,
      temperature:1.0,
      response_format:{type:'json_object'},
    }),
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${resp.status}`);

}

<script>
/* ══════════════════════════════════════════════
   グローバルタップキラキラエフェクト（全画面）
══════════════════════════════════════════════ */
(function initGlobalTapFx(){
  const tapFx = document.getElementById('global-tap-fx');
  if(!tapFx) return;

  const COLORS  = ['#FF80CC','#CC80FF','#80C8FF','#FFD080','#FF80AA','#A0DDFF','#FFB3DE','#FFAAEE'];
  const EMOJIS  = ['✦','★','✸','✺','✿','♥'];

  function spawnBurst(x, y){
    const burst = document.createElement('div');
    burst.className = 'tap-burst';
    burst.style.left = x + 'px';
    burst.style.top  = y + 'px';

    const count = 7 + Math.floor(Math.random()*5); // 7〜11個（小さめ）
    for(let i = 0; i < count; i++){
      const angle = (360 / count) * i + Math.random()*25 - 12;
      const dist  = 25 + Math.random()*35; // 飛距離（小さく）
      const rad   = angle * Math.PI / 180;
      const tx    = Math.round(Math.cos(rad) * dist);
      const ty    = Math.round(Math.sin(rad) * dist);
      const col   = COLORS[Math.floor(Math.random()*COLORS.length)];
      const sz    = (4 + Math.random()*5).toFixed(1) + 'px'; // 4〜9px（小さく）
      const dur   = (0.45 + Math.random()*0.35).toFixed(2) + 's';
      const delay = (Math.random()*0.06).toFixed(2) + 's';
      const rot   = Math.round(Math.random()*360) + 'deg';

      if(Math.random() < 0.28){
        const el = document.createElement('span');
        el.className = 'tb-heart';
        el.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
        el.style.cssText = `--sz:${sz};--col:${col};--tx:${tx}px;--ty:${ty}px;--dur:${dur};--delay:${delay};--rot:${rot};color:${col};`;
        burst.appendChild(el);
      } else {
        const el = document.createElement('div');
        el.className = 'tb-star';
        el.style.cssText = `--sz:${sz};--col:${col};--tx:${tx}px;--ty:${ty}px;--dur:${dur};--delay:${delay};--rot:${rot};`;
        burst.appendChild(el);
      }
    }

    tapFx.appendChild(burst);
    setTimeout(()=>{ if(burst.parentNode) burst.remove(); }, 900);
  }

  // window全体にキャプチャフェーズで登録（どの画面でも反応）
  window.addEventListener('pointerdown', (e)=>{
    spawnBurst(e.clientX, e.clientY);
  }, {capture: true, passive: true});

  // モバイル touchstart（pointer未対応端末向け）
  window.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    if(t) spawnBurst(t.clientX, t.clientY);
  }, {capture: true, passive: true});

})();
</script>
